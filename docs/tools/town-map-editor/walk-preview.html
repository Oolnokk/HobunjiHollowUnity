<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Walk Preview — Hobunji Hollow</title>
<style>
:root{--bg:#07101a;--hud:#0c1620cc;--text:#edf4ff;--muted:#9fb2cc;--acc:#6aa7ff;--good:#34d399;--warn:#fbbf24;--line:#26384f;--grid:#142238;--player:#ffffff;--playerShadow:#00b4ff66}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;touch-action:none;user-select:none}
#gameCanvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--hud);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);flex-wrap:wrap;pointer-events:none;z-index:10}
#hud button{pointer-events:auto}
.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.055);border-radius:999px;padding:4px 9px;color:var(--muted);font-size:12px}
button{border:1px solid rgba(106,167,255,.38);background:rgba(106,167,255,.16);color:var(--text);border-radius:10px;padding:6px 12px;font:inherit;font-weight:750;cursor:pointer;font-size:12px}
button:active{transform:translateY(1px)}
#controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:none;gap:6px;flex-direction:column;align-items:center;z-index:10;pointer-events:none}
#controls.visible{display:flex}
.dpad{display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(2,40px);gap:4px;pointer-events:auto}
.dpad button{width:40px;height:40px;border-radius:10px;padding:0;font-size:16px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22)}
#noMap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg);z-index:20;display:none}
#noMap.visible{display:flex}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="hud">
  <button id="backBtn">← Editor</button>
  <span class="pill" id="mapLabel">No map</span>
  <span class="pill" id="posLabel">Tile —</span>
  <span class="pill" id="modeLabel">WASD / Arrow keys to walk</span>
</div>

<div id="controls">
  <div class="dpad">
    <div></div><button id="btnU">▲</button><div></div>
    <button id="btnL">◀</button><button id="btnD">▼</button><button id="btnR">▶</button>
  </div>
</div>

<div id="noMap">
  <div style="font-size:22px;font-weight:900">No preview map found</div>
  <div style="color:var(--muted);max-width:320px;text-align:center;line-height:1.5">Open the town map editor and click <b>Walk Preview</b> to start a session with your current map.</div>
  <button onclick="window.close()">Close tab</button>
</div>

<script>
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ── Load map from localStorage ───────────────────────────────
const raw = localStorage.getItem('walkPreviewMap');
let MAP = null;
if (raw) {
  try { MAP = JSON.parse(raw); } catch(e) {}
}

if (!MAP) {
  document.getElementById('noMap').classList.add('visible');
}

// ── Map helpers ──────────────────────────────────────────────
const map   = MAP?.map   || { cols: 48, rows: 32 };
const houses = MAP?.houses || [];
const paths  = MAP?.npcPaths || [];
const COLS = map.cols || 48;
const ROWS = map.rows || 32;

// Build blocked tile set from house footprints
const blocked = new Set();
for (const h of houses) {
  for (let ry = 0; ry < h.depth; ry++) {
    for (let rx = 0; rx < h.width; rx++) {
      blocked.add(`${h.x + rx},${h.y + ry}`);
    }
  }
}

// Door tiles are walkable entry points — unblock them
for (const h of houses) {
  const door = doorTile(h);
  blocked.delete(`${door.x},${door.y}`);
}

function doorTile(h) {
  const offset = Math.max(0, Math.min(Math.round(h.door?.offset ?? 0), Math.max(h.width, h.depth) - 1));
  if (h.door?.side === 'north') return { x: h.x + Math.min(offset, h.width - 1), y: h.y - 1 };
  if (h.door?.side === 'south') return { x: h.x + Math.min(offset, h.width - 1), y: h.y + h.depth };
  if (h.door?.side === 'west')  return { x: h.x - 1, y: h.y + Math.min(offset, h.depth - 1) };
  return { x: h.x + h.width, y: h.y + Math.min(offset, h.depth - 1) };
}

function isBlocked(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= COLS || ty >= ROWS) return true;
  return blocked.has(`${tx},${ty}`);
}

// ── State ───────────────────────────────────────────────────
const TILE = 32; // target tile size in pixels at zoom 1

// Player position in tile-space (floats for smooth movement)
let px = Math.floor(COLS / 2);
let py = Math.floor(ROWS / 2);

// Find a clear starting tile
outer: for (let r = 0; r < Math.max(COLS, ROWS); r++) {
  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
      const tx = Math.floor(COLS / 2) + dx;
      const ty = Math.floor(ROWS / 2) + dy;
      if (!isBlocked(tx, ty)) { px = tx + 0.5; py = ty + 0.5; break outer; }
    }
  }
}

// Camera
let camX = 0, camY = 0;
let zoom = 0; // computed in resize

// Input
const keys = {};
const touch = { dx: 0, dy: 0 };
let touchId = null, touchStartX = 0, touchStartY = 0;

// Dpad virtual buttons
const virtualInput = { up: false, down: false, left: false, right: false };

// ── Resize ──────────────────────────────────────────────────
function resize() {
  const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  const r = canvas.getBoundingClientRect();
  canvas.width  = Math.round(r.width  * dpr);
  canvas.height = Math.round(r.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Choose a comfortable zoom level
  const margin = 80;
  zoom = Math.max(10, Math.min(
    (r.width  - margin * 2) / COLS,
    (r.height - margin * 2) / ROWS,
    36
  ));
  snapCamera();
  draw();
}

function snapCamera() {
  const r = canvas.getBoundingClientRect();
  const targetCX = px * zoom;
  const targetCY = py * zoom;
  camX = r.width  / 2 - targetCX;
  camY = r.height / 2 - targetCY;
}

// ── Movement ────────────────────────────────────────────────
const SPEED = 5.5; // tiles per second
let lastTime = 0;

function update(now) {
  if (!lastTime) lastTime = now;
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  const up    = keys['ArrowUp']    || keys['w'] || keys['W'] || virtualInput.up;
  const down  = keys['ArrowDown']  || keys['s'] || keys['S'] || virtualInput.down;
  const left  = keys['ArrowLeft']  || keys['a'] || keys['A'] || virtualInput.left;
  const right = keys['ArrowRight'] || keys['d'] || keys['D'] || virtualInput.right;

  let dx = (right ? 1 : 0) - (left ? 1 : 0);
  let dy = (down  ? 1 : 0) - (up   ? 1 : 0);

  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  const step = SPEED * dt;
  const nx = px + dx * step;
  const ny = py + dy * step;

  // Tile-based collision: check the four corner-adjacent tiles the player occupies
  const R = 0.35; // player radius in tiles
  const tryX = (x) => !isBlocked(Math.floor(x - R), Math.floor(py)) && !isBlocked(Math.floor(x + R - 0.001), Math.floor(py));
  const tryY = (y) => !isBlocked(Math.floor(px), Math.floor(y - R)) && !isBlocked(Math.floor(px), Math.floor(y + R - 0.001));

  if (dx !== 0 && tryX(nx)) px = Math.max(R, Math.min(COLS - R, nx));
  if (dy !== 0 && tryY(ny)) py = Math.max(R, Math.min(ROWS - R, ny));

  // Smooth camera follow
  const r = canvas.getBoundingClientRect();
  const targetCX = r.width  / 2 - px * zoom;
  const targetCY = r.height / 2 - py * zoom;
  const camLerp = 1 - Math.pow(0.06, dt);
  camX += (targetCX - camX) * camLerp;
  camY += (targetCY - camY) * camLerp;

  // HUD
  const tx = Math.floor(px);
  const ty = Math.floor(py);
  document.getElementById('posLabel').textContent = `Tile ${tx}, ${ty}`;
}

// ── Drawing ─────────────────────────────────────────────────
function worldToScreen(tx, ty) {
  return { x: camX + tx * zoom, y: camY + ty * zoom };
}

function drawGrid() {
  const r = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, r.width, r.height);
  ctx.fillStyle = '#07101a';
  ctx.fillRect(0, 0, r.width, r.height);

  const startX = Math.max(0, Math.floor(-camX / zoom));
  const endX   = Math.min(COLS, Math.ceil((r.width - camX) / zoom) + 1);
  const startY = Math.max(0, Math.floor(-camY / zoom));
  const endY   = Math.min(ROWS, Math.ceil((r.height - camY) / zoom) + 1);

  ctx.strokeStyle = '#142238';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = startX; x <= endX; x++) {
    const sx = camX + x * zoom;
    ctx.moveTo(sx, camY + startY * zoom);
    ctx.lineTo(sx, camY + endY * zoom);
  }
  for (let y = startY; y <= endY; y++) {
    const sy = camY + y * zoom;
    ctx.moveTo(camX + startX * zoom, sy);
    ctx.lineTo(camX + endX * zoom, sy);
  }
  ctx.stroke();

  // Map border
  ctx.strokeStyle = 'rgba(255,255,255,.25)';
  ctx.lineWidth = 2;
  ctx.strokeRect(camX, camY, COLS * zoom, ROWS * zoom);
}

function drawHouses() {
  for (const h of houses) {
    const s = worldToScreen(h.x, h.y);
    const w = h.width * zoom;
    const d = h.depth * zoom;

    // Fill
    ctx.fillStyle = h.color || '#8b5cf6';
    ctx.globalAlpha = 0.52;
    ctx.fillRect(s.x, s.y, w, d);
    ctx.globalAlpha = 1;

    // Stroke
    ctx.strokeStyle = 'rgba(255,255,255,.55)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(s.x, s.y, w, d);

    // Door marker
    const dt = doorTile(h);
    const ds = worldToScreen(dt.x, dt.y);
    ctx.fillStyle = '#fde047';
    ctx.fillRect(ds.x + zoom * 0.25, ds.y + zoom * 0.25, zoom * 0.5, zoom * 0.5);

    // Label
    if (zoom > 14) {
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.min(zoom * 0.3, 13)}px system-ui`;
      ctx.globalAlpha = 0.85;
      ctx.fillText(h.label || h.id, s.x + 4, s.y + 14);
      ctx.globalAlpha = 1;
    }
  }
}

function drawPaths() {
  for (const p of paths) {
    if (!p.nodes || p.nodes.length < 2) continue;
    ctx.strokeStyle = 'rgba(56,189,248,.55)';
    ctx.lineWidth = 2;
    ctx.setLineDash([zoom * 0.3, zoom * 0.2]);
    ctx.beginPath();
    for (let i = 0; i < p.nodes.length; i++) {
      const c = worldToScreen(p.nodes[i].x + 0.5, p.nodes[i].y + 0.5);
      if (i === 0) ctx.moveTo(c.x, c.y); else ctx.lineTo(c.x, c.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Nodes
    for (const n of p.nodes) {
      const c = worldToScreen(n.x + 0.5, n.y + 0.5);
      ctx.fillStyle = '#38bdf8';
      ctx.beginPath();
      ctx.arc(c.x, c.y, Math.max(3, zoom * 0.14), 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlayer() {
  const s = worldToScreen(px, py);
  const r = zoom * 0.35;

  // Shadow glow
  ctx.beginPath();
  ctx.arc(s.x, s.y, r * 1.5, 0, Math.PI * 2);
  const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r * 1.5);
  grd.addColorStop(0, 'rgba(0,180,255,0.28)');
  grd.addColorStop(1, 'rgba(0,180,255,0)');
  ctx.fillStyle = grd;
  ctx.fill();

  // Body
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = '#6aa7ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Direction dot (facing indicator — based on last input direction)
  ctx.beginPath();
  ctx.arc(s.x + facing.x * r * 0.48, s.y + facing.y * r * 0.48, r * 0.22, 0, Math.PI * 2);
  ctx.fillStyle = '#6aa7ff';
  ctx.fill();
}

const facing = { x: 0, y: 1 };

function draw() {
  drawGrid();
  drawHouses();
  drawPaths();
  drawPlayer();
}

// ── Game loop ────────────────────────────────────────────────
function loop(now) {
  if (MAP) {
    update(now);
    draw();
  }
  requestAnimationFrame(loop);
}

// ── Input ────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  const dir = dirFromKey(e.key);
  if (dir) { facing.x = dir.x; facing.y = dir.y; }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function dirFromKey(k) {
  if (k === 'ArrowUp'    || k === 'w' || k === 'W') return { x: 0, y: -1 };
  if (k === 'ArrowDown'  || k === 's' || k === 'S') return { x: 0, y:  1 };
  if (k === 'ArrowLeft'  || k === 'a' || k === 'A') return { x: -1, y: 0 };
  if (k === 'ArrowRight' || k === 'd' || k === 'D') return { x:  1, y: 0 };
  return null;
}

// Touch: swipe-to-move
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    touchId = e.touches[0].identifier;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    document.getElementById('controls').classList.add('visible');
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  for (const t of e.touches) {
    if (t.identifier !== touchId) continue;
    touch.dx = t.clientX - touchStartX;
    touch.dy = t.clientY - touchStartY;
    const mag = Math.hypot(touch.dx, touch.dy);
    if (mag > 8) {
      const nx = touch.dx / mag, ny = touch.dy / mag;
      virtualInput.right = nx > 0.4;
      virtualInput.left  = nx < -0.4;
      virtualInput.down  = ny > 0.4;
      virtualInput.up    = ny < -0.4;
      facing.x = Math.round(nx); facing.y = Math.round(ny);
    } else {
      virtualInput.right = virtualInput.left = virtualInput.up = virtualInput.down = false;
    }
    touchStartX = t.clientX; touchStartY = t.clientY;
  }
}, { passive: true });
canvas.addEventListener('touchend', () => {
  touchId = null;
  virtualInput.right = virtualInput.left = virtualInput.up = virtualInput.down = false;
}, { passive: true });

// D-pad buttons
function dpadPress(dir, active) {
  virtualInput[dir] = active;
  if (active) {
    const m = { up: {x:0,y:-1}, down: {x:0,y:1}, left: {x:-1,y:0}, right: {x:1,y:0} }[dir];
    if (m) { facing.x = m.x; facing.y = m.y; }
  }
}
document.getElementById('btnU').addEventListener('pointerdown', () => dpadPress('up',   true));
document.getElementById('btnD').addEventListener('pointerdown', () => dpadPress('down', true));
document.getElementById('btnL').addEventListener('pointerdown', () => dpadPress('left', true));
document.getElementById('btnR').addEventListener('pointerdown', () => dpadPress('right',true));
['btnU','btnD','btnL','btnR'].forEach(id => {
  document.getElementById(id).addEventListener('pointerup',     () => { virtualInput.up=virtualInput.down=virtualInput.left=virtualInput.right=false; });
  document.getElementById(id).addEventListener('pointercancel', () => { virtualInput.up=virtualInput.down=virtualInput.left=virtualInput.right=false; });
});

document.getElementById('backBtn').addEventListener('click', () => window.close());

// Show dpad on mobile
if ('ontouchstart' in window) {
  document.getElementById('controls').classList.add('visible');
}

// Update label
if (MAP) {
  document.getElementById('mapLabel').textContent =
    `${map.name || map.id || 'Map'} (${COLS}×${ROWS}) · ${houses.length} buildings · ${paths.length} paths`;
  document.title = `Walk Preview — ${map.name || map.id || 'Map'}`;
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
