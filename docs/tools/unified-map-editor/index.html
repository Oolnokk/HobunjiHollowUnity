<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Hobunji Hollow — Unified Map Editor</title>
<style>
:root{--bg:#07101a;--panel:#111b28;--panel2:#0c141e;--border:rgba(255,255,255,.12);--acc:#6aa7ff;--ok:#34d399;--warn:#fbbf24;--bad:#fb7185;--text:#edf5ff;--muted:#9fb4cf;--house:#8b5cf6;--path:#38bdf8;--sched:#f97316;--grid:#1d3147}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:13px}
button,input,select,textarea{font:inherit}
button{border:1px solid rgba(106,167,255,.38);background:rgba(106,167,255,.16);color:var(--text);border-radius:9px;padding:7px 11px;font-weight:700;cursor:pointer;transition:background .1s}
button:hover{background:rgba(106,167,255,.26)}
button:active{transform:translateY(1px)}
button.sec{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.06)}
button.ok{border-color:rgba(52,211,153,.42);background:rgba(52,211,153,.14)}
button.warn{border-color:rgba(251,191,36,.42);background:rgba(251,191,36,.12)}
button.bad{border-color:rgba(251,113,133,.42);background:rgba(251,113,133,.12)}
button.act{outline:2px solid var(--acc);outline-offset:1px}
input,select,textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:var(--text);padding:7px 9px;outline:none}
textarea{min-height:60px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;line-height:1.35}
label{display:block;color:var(--muted);font-size:11px;margin-bottom:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.hr{height:1px;background:var(--border);margin:8px 0}
.muted{color:var(--muted);font-size:11px;line-height:1.4}
.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);border-radius:999px;padding:3px 8px;color:var(--muted);font-size:11px;white-space:nowrap}
.item{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);border-radius:8px;padding:7px 9px;cursor:pointer;margin-bottom:4px}
.item:hover{background:rgba(255,255,255,.07)}
.item.sel{outline:2px solid var(--acc);outline-offset:1px}
.item-name{font-weight:700;font-size:12px}
.item-meta{color:var(--muted);font-size:11px;margin-top:2px}
.cd{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,.4);display:inline-block;flex:0 0 auto;vertical-align:middle}

#shell{display:flex;flex-direction:column;height:100%}
#topbar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.3px;margin-right:4px}
.vtab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid transparent;background:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .1s}
.vtab:hover{color:var(--text);background:rgba(255,255,255,.06)}
.vtab.active{color:var(--text);background:rgba(106,167,255,.14);border-color:rgba(106,167,255,.3)}
#topbar-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#statusbar{font-size:11px;color:var(--muted);padding:2px 0}

#main{display:flex;flex:1;min-height:0}
#sidebar{width:380px;min-width:260px;max-width:50vw;display:flex;flex-direction:column;background:var(--panel);border-right:1px solid var(--border);flex-shrink:0}
#sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 16px;-webkit-overflow-scrolling:touch}
.section{border-left:4px solid var(--sec,var(--acc));background:linear-gradient(180deg,var(--secBg,rgba(106,167,255,.08)),transparent);margin:8px;border-radius:0 8px 8px 0;padding:8px}
.sect-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.sect-head b{font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.sect-tag{font-size:10px;color:var(--muted);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:2px 7px}
.itemlist{max-height:180px;overflow-y:auto;padding-right:2px}

#view{flex:1;position:relative;min-width:0;min-height:0}
#canvas2d{display:block;width:100%;height:100%;touch-action:none}
#wrap3d,#wrapWalk{position:absolute;inset:0;display:none}
#wrap3d.active,#wrapWalk.active{display:block}
#canvas2d.hidden{display:none}
#hud{position:absolute;left:8px;top:8px;display:flex;gap:5px;flex-wrap:wrap;pointer-events:none;max-width:calc(100% - 16px)}
#walkHud{position:absolute;left:50%;top:16px;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:5px;pointer-events:none}
#walkHud.active{display:flex}
#walkControls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:none;gap:5px}
#walkControls.active{display:flex}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;pointer-events:none;display:none}
#crosshair.active{display:block}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.7);border-radius:1px}
#crosshair::before{width:2px;height:16px;left:7px;top:0}
#crosshair::after{width:16px;height:2px;left:0;top:7px}

#modeBar{display:flex;gap:4px;padding:6px 8px;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <h1>UNIFIED MAP EDITOR</h1>
    <div style="display:flex;gap:4px">
      <button class="vtab active" id="btn2d">🗺 2D Map</button>
      <button class="vtab" id="btn3d">🏘 3D Preview</button>
      <button class="vtab" id="btnWalk">🚶 Walk Preview</button>
    </div>
    <div id="topbar-right">
      <button class="ok" id="exportBtn">⬇ Export JSON</button>
      <button class="sec" id="copyBtn">Copy JSON</button>
      <button class="sec" id="importBtn">Import JSON</button>
      <input id="importFile" type="file" hidden accept=".json,application/json">
      <button class="warn" id="seedBtn">Load Starter</button>
      <button class="bad" id="resetBtn">Reset</button>
    </div>
  </div>

  <div id="main">
    <aside id="sidebar">
      <div id="modeBar">
        <button class="sec act" id="modeSelect" data-mode="select">Select</button>
        <button class="sec" id="modeHouse" data-mode="house">+ House</button>
        <button class="sec" id="modePath" data-mode="path">+ Path Node</button>
        <button class="sec" id="modeErase" data-mode="erase">Erase</button>
        <button class="sec" id="fitBtn" style="margin-left:auto">Fit</button>
      </div>
      <div id="sidebar-scroll">

        <!-- MAP SETTINGS -->
        <div class="section" style="--sec:#94a3b8;--secBg:rgba(148,163,184,.08)">
          <div class="sect-head"><b>Map</b><span class="sect-tag" id="countPill">0 houses · 0 paths</span></div>
          <div class="g2">
            <div><label>Map id</label><input id="mapId" value="hobunji_main_town"></div>
            <div><label>Display name</label><input id="mapName" value="Hobunji Main Town"></div>
          </div>
          <div class="g2" style="margin-top:6px">
            <div><label>Columns</label><input id="mapCols" type="number" min="8" max="200" value="48"></div>
            <div><label>Rows</label><input id="mapRows" type="number" min="8" max="200" value="32"></div>
          </div>
          <div class="row" style="margin-top:6px">
            <button class="sec" id="applyMapBtn">Apply size</button>
            <span class="pill" id="statusPill">Ready</span>
          </div>
        </div>

        <!-- HOUSES -->
        <div class="section" style="--sec:#8b5cf6;--secBg:rgba(139,92,246,.08)">
          <div class="sect-head"><b>Houses</b><span class="sect-tag">footprints</span></div>
          <div class="g2">
            <div><label>House id</label><input id="houseId" value="house_001"></div>
            <div><label>Label</label><input id="houseLabel" value="Small house"></div>
          </div>
          <div class="g3" style="margin-top:6px">
            <div><label>X</label><input id="houseX" type="number" value="5"></div>
            <div><label>Y</label><input id="houseY" type="number" value="5"></div>
            <div><label>Rotation</label><select id="houseRot"><option>0</option><option>90</option><option>180</option><option>270</option></select></div>
          </div>
          <div class="g3" style="margin-top:6px">
            <div><label>Width</label><input id="houseW" type="number" min="1" value="6"></div>
            <div><label>Depth</label><input id="houseD" type="number" min="1" value="5"></div>
            <div><label>Color</label><input id="houseColor" value="#8b5cf6"></div>
          </div>
          <div class="g3" style="margin-top:6px">
            <div><label>Door side</label><select id="doorSide"><option>south</option><option>north</option><option>east</option><option>west</option></select></div>
            <div><label>Door offset</label><input id="doorOffset" type="number" value="2"></div>
            <div><label>Type</label><input id="footprintType" value="house"></div>
          </div>
          <div style="margin-top:6px"><label>Notes</label><textarea id="houseNotes" rows="2">Place as blocking building. Door connects to nearby road.</textarea></div>
          <div class="row" style="margin-top:6px">
            <button class="ok" id="addHouseBtn">Add</button>
            <button class="sec" id="updateHouseBtn">Update selected</button>
            <button class="bad" id="deleteHouseBtn">Delete</button>
          </div>
          <div class="hr"></div>
          <div class="itemlist" id="houseList"><div class="muted">No houses yet.</div></div>
        </div>

        <!-- NPC PATHS -->
        <div class="section" style="--sec:#38bdf8;--secBg:rgba(56,189,248,.08)">
          <div class="sect-head"><b>NPC Paths</b><span class="sect-tag">routes</span></div>
          <div class="g2">
            <div><label>Path id</label><input id="pathId" value="npc_path_001"></div>
            <div><label>NPC id</label><input id="pathNpcId" value="npc_001"></div>
          </div>
          <div class="g2" style="margin-top:6px">
            <div><label>Label</label><input id="pathLabel" value="Morning route"></div>
            <div><label>Behavior</label><select id="pathBehavior"><option>walk_route</option><option>patrol_loop</option><option>schedule_loop</option><option>wander_between_nodes</option><option>one_way_walk</option></select></div>
          </div>
          <div class="g3" style="margin-top:6px">
            <div><label>Start (min)</label><input id="pathStart" type="number" value="480"></div>
            <div><label>End (min)</label><input id="pathEnd" type="number" value="1200"></div>
            <div><label>Loop</label><select id="pathLoop"><option value="true">yes</option><option value="false">no</option></select></div>
          </div>
          <div class="g3" style="margin-top:6px">
            <div><label>Node X</label><input id="nodeX" type="number" value="10"></div>
            <div><label>Node Y</label><input id="nodeY" type="number" value="10"></div>
            <div><label>Node label</label><input id="nodeLabel" value="waypoint"></div>
          </div>
          <div class="row" style="margin-top:6px">
            <button class="ok" id="newPathBtn">New path</button>
            <button class="sec" id="addNodeBtn">Add node</button>
            <button class="sec" id="updatePathBtn">Update info</button>
            <button class="bad" id="deletePathBtn">Delete</button>
          </div>
          <div class="hr"></div>
          <div class="itemlist" id="pathList"><div class="muted">No paths yet.</div></div>
        </div>

        <!-- NPC SCHEDULES -->
        <div class="section" style="--sec:#f97316;--secBg:rgba(249,115,22,.08)">
          <div class="sect-head"><b>NPC Schedules</b><span class="sect-tag">daily blocks</span></div>
          <div class="g2">
            <div><label>NPC id</label><input id="schedNpcId" value="npc_001"></div>
            <div><label>NPC name</label><input id="schedNpcName" value="Unnamed NPC"></div>
          </div>
          <div class="g3" style="margin-top:6px">
            <div><label>Start time</label><input id="schedStart" value="08:00"></div>
            <div><label>End time</label><input id="schedEnd" value="10:00"></div>
            <div><label>Action</label><select id="schedAction"><option>follow_path</option><option>stay_at_tile</option><option>work_at_building</option><option>visit_building</option><option>wander_area</option><option>sleep</option></select></div>
          </div>
          <div class="g2" style="margin-top:6px">
            <div><label>Target id / path id</label><input id="schedTarget" value="npc_path_001"></div>
            <div><label>Days</label><input id="schedDays" value="all"></div>
          </div>
          <div style="margin-top:6px"><label>Note</label><textarea id="schedNote" rows="2">Readable behavior note for implementers.</textarea></div>
          <div class="row" style="margin-top:6px">
            <button class="ok" id="addSchedBtn">Add block</button>
            <button class="bad" id="deleteSchedBtn">Delete selected</button>
          </div>
          <div class="hr"></div>
          <div class="itemlist" id="schedList"><div class="muted">No schedule blocks yet.</div></div>
        </div>

        <!-- SIM CLOCK -->
        <div class="section" style="--sec:#6aa7ff;--secBg:rgba(106,167,255,.06)">
          <div class="sect-head"><b>Sim Clock</b><span class="sect-tag" id="clockReadout">08:00</span></div>
          <div class="g2">
            <div><label>Speed (min/sec)</label><input id="timeSpeed" type="number" value="0" min="0" max="120" step="1"></div>
            <div style="display:flex;align-items:flex-end"><button class="sec" id="resetClockBtn" style="width:100%">Reset 08:00</button></div>
          </div>
        </div>

        <!-- JSON PREVIEW -->
        <div class="section" style="--sec:#34d399;--secBg:rgba(52,211,153,.06)">
          <div class="sect-head"><b>JSON Preview</b><span class="sect-tag">agent-readable</span></div>
          <textarea id="jsonPreview" rows="8" readonly></textarea>
        </div>

      </div>
    </aside>

    <div id="view">
      <canvas id="canvas2d"></canvas>
      <div id="wrap3d"></div>
      <div id="wrapWalk"></div>
      <div id="hud">
        <span class="pill" id="modePill">Mode: select</span>
        <span class="pill" id="cursorPill">—</span>
        <span class="pill" id="selPill">Selected: none</span>
      </div>
      <div id="walkHud">
        <span class="pill">WASD / Arrow Keys to move · Esc to exit walk</span>
        <span class="pill" id="walkPosPill">pos: 0, 0</span>
      </div>
      <div id="crosshair"></div>
      <div id="walkControls">
        <button class="sec" id="exitWalkBtn">Exit Walk Preview</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="../../js/GLTFLoader.js"></script>
<script src="../../js/WallBuilder.js"></script>
<script>
(() => {
'use strict';

// ── Helpers ──────────────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function num(id, fb=0) { const v = Number($(id).value); return Number.isFinite(v) ? v : fb; }
function txt(id) { return String($(id).value || '').trim(); }
function uid(p) { return `${p}_${Math.random().toString(36).slice(2,6)}_${Date.now().toString(36).slice(-4)}`; }
function normalizeId(raw, fb) {
  const s = String(raw || '').trim().toLowerCase().replace(/[^a-z0-9_\-]+/g,'_').replace(/^_+|_+$/g,'');
  return s || uid(fb);
}
function nextId(prefix, list) {
  let n = list.length + 1;
  let id = `${prefix}_${String(n).padStart(3,'0')}`;
  const taken = new Set(list.map(x => x.id));
  while (taken.has(id)) { n++; id = `${prefix}_${String(n).padStart(3,'0')}`; }
  return id;
}

// ── State ────────────────────────────────────────────────────────────────────

const state = {
  map: { id: 'hobunji_main_town', name: 'Hobunji Main Town', cols: 48, rows: 32 },
  houses: [],
  npcPaths: [],
  npcSchedules: [],
  implementationHints: [
    'House footprint rectangles are blocked building tiles.',
    'Door tile derived from door.side and door.offset relative to footprint.',
    'NPC path nodes are ordered; behavior controls looping.',
    'Schedule blocks reference path ids, building ids, or tile coordinates via targetId.',
    'This JSON is descriptive; runtime code normalizes ids, collisions, and layers.'
  ]
};

// ── Sim clock ─────────────────────────────────────────────────────────────────

let simMinutes = 8 * 60;
let lastTickMs = performance.now();
function formatClock(m) {
  m = ((Math.floor(m) % 1440) + 1440) % 1440;
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}
function tickClock(now) {
  const dt = clamp((now - lastTickMs) / 1000, 0, 0.2);
  lastTickMs = now;
  const speed = Number($('timeSpeed').value) || 0;
  simMinutes = (simMinutes + dt * speed) % 1440;
  $('clockReadout').textContent = formatClock(simMinutes);
  requestAnimationFrame(tickClock);
}

// ── Selection ─────────────────────────────────────────────────────────────────

let mode = 'select';
let selected = null;
let activePathId = null;

function setMode(m) {
  mode = m;
  document.querySelectorAll('#modeBar button[data-mode]').forEach(b =>
    b.classList.toggle('act', b.dataset.mode === m)
  );
  $('modePill').textContent = `Mode: ${m}`;
}

function selectThing(kind, id, extra={}) {
  selected = { kind, id, ...extra };
  if (kind === 'house') fillHouseForm(state.houses.find(h => h.id === id));
  if (kind === 'path' || kind === 'node') {
    const p = state.npcPaths.find(x => x.id === id);
    if (p) { activePathId = p.id; fillPathForm(p); $('schedNpcId').value = p.npcId; $('schedTarget').value = p.id; }
  }
  if (kind === 'schedule') fillSchedForm(state.npcSchedules.find(s => s.id === id));
  updateAll();
}

function selText() {
  if (!selected) return 'Selected: none';
  if (selected.kind === 'node') return `node ${selected.nodeIndex+1} of ${selected.id}`;
  return `${selected.kind}: ${selected.id}`;
}

// ── 2D Canvas ────────────────────────────────────────────────────────────────

const canvas = $('canvas2d');
const ctx = canvas.getContext('2d');
let cam = { x: 0, y: 0, zoom: 18 };
let drag = false, dragStart = null, movedDuringPointer = false;
const ptrs = new Map();
let pinchStart = null;

function w2s(x, y) { return { x: x * cam.zoom + cam.x, y: y * cam.zoom + cam.y }; }
function s2w(x, y) { return { x: (x - cam.x) / cam.zoom, y: (y - cam.y) / cam.zoom }; }
function canvasPt(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

function fitView() {
  const r = canvas.getBoundingClientRect();
  cam.zoom = Math.max(8, Math.min((r.width - 48) / state.map.cols, (r.height - 48) / state.map.rows));
  cam.x = (r.width - state.map.cols * cam.zoom) / 2;
  cam.y = (r.height - state.map.rows * cam.zoom) / 2;
  draw2d();
}
function resizeCanvas() {
  const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  const r = canvas.getBoundingClientRect();
  canvas.width = Math.round(r.width * dpr);
  canvas.height = Math.round(r.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw2d();
}

function draw2d() {
  const r = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, r.width, r.height);
  ctx.fillStyle = '#07101a'; ctx.fillRect(0, 0, r.width, r.height);
  // grid
  ctx.strokeStyle = 'rgba(255,255,255,.065)'; ctx.lineWidth = 1;
  for (let x = 0; x <= state.map.cols; x++) {
    const p = w2s(x, 0); ctx.beginPath(); ctx.moveTo(p.x, cam.y); ctx.lineTo(p.x, cam.y + state.map.rows * cam.zoom); ctx.stroke();
  }
  for (let y = 0; y <= state.map.rows; y++) {
    const p = w2s(0, y); ctx.beginPath(); ctx.moveTo(cam.x, p.y); ctx.lineTo(cam.x + state.map.cols * cam.zoom, p.y); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 2;
  ctx.strokeRect(cam.x, cam.y, state.map.cols * cam.zoom, state.map.rows * cam.zoom);
  // houses
  state.houses.forEach(h => {
    const p = w2s(h.x, h.y);
    const isSel = selected?.kind === 'house' && selected.id === h.id;
    ctx.fillStyle = h.color || '#8b5cf6'; ctx.globalAlpha = .5; ctx.fillRect(p.x, p.y, h.width * cam.zoom, h.depth * cam.zoom); ctx.globalAlpha = 1;
    ctx.strokeStyle = isSel ? '#fff' : 'rgba(255,255,255,.6)'; ctx.lineWidth = isSel ? 2.5 : 1.5;
    ctx.strokeRect(p.x, p.y, h.width * cam.zoom, h.depth * cam.zoom);
    const door = deriveDoor(h); const dp = w2s(door.x, door.y);
    ctx.fillStyle = '#fef08a'; ctx.fillRect(dp.x + cam.zoom*.25, dp.y + cam.zoom*.25, cam.zoom*.5, cam.zoom*.5);
    if (cam.zoom > 12) {
      ctx.fillStyle = '#fff'; ctx.font = `${clamp(cam.zoom*.32, 9, 13)}px system-ui`;
      ctx.fillText(h.label || h.id, p.x + 4, p.y + 13);
    }
  });
  // paths
  state.npcPaths.forEach(p => {
    const isActive = p.id === activePathId;
    ctx.strokeStyle = isActive ? '#7dd3fc' : 'rgba(56,189,248,.65)'; ctx.lineWidth = isActive ? 3 : 2;
    ctx.beginPath();
    p.nodes.forEach((n, i) => { const s = w2s(n.x + .5, n.y + .5); if (i === 0) ctx.moveTo(s.x, s.y); else ctx.lineTo(s.x, s.y); });
    ctx.stroke();
    p.nodes.forEach((n, i) => {
      const s = w2s(n.x + .5, n.y + .5);
      const isSelNode = selected?.kind === 'node' && selected.id === p.id && selected.nodeIndex === i;

function hitTest(tile) {
  for (const p of state.npcPaths)
    for (let i = p.nodes.length-1; i >= 0; i--)
      if (p.nodes[i].x === tile.x && p.nodes[i].y === tile.y) return { kind:'node', id:p.id, nodeIndex:i };
  for (let i = state.houses.length-1; i >= 0; i--) {
    const h = state.houses[i];
    if (tile.x >= h.x && tile.x < h.x+h.width && tile.y >= h.y && tile.y < h.y+h.depth) return { kind:'house', id:h.id };
  }
  return null;
}

function onTap(tile) {
  if (tile.x < 0 || tile.y < 0 || tile.x >= state.map.cols || tile.y >= state.map.rows) return;
  if (mode === 'house') { addHouseAt(tile.x, tile.y); return; }
  if (mode === 'path') { addNodeAt(tile.x, tile.y); return; }
  const hit = hitTest(tile);
  if (mode === 'erase') {
    if (!hit) return;
    selected = hit;
    if (hit.kind === 'house') deleteHouse();

  }
  if (hit) selectThing(hit.kind, hit.id, hit);

function deriveDoor(h) {
  const off = clamp(Math.round(h.door?.offset ?? 0), 0, Math.max(h.width, h.depth) - 1);
  const side = h.door?.side || 'south';
  if (side === 'north') return { x: h.x + clamp(off, 0, h.width-1), y: h.y - 1 };
  if (side === 'south') return { x: h.x + clamp(off, 0, h.width-1), y: h.y + h.depth };
  if (side === 'west')  return { x: h.x - 1, y: h.y + clamp(off, 0, h.depth-1) };
  return { x: h.x + h.width, y: h.y + clamp(off, 0, h.depth-1) };
}

function findObjectByNameLoose(rootObj, name) {
  let found = null; const want = String(name).toLowerCase();
  rootObj.traverse(o => { if (!found && String(o.name||'').toLowerCase() === want) found = o; });
  return found;
}

function analyzeShingleTemplate(sceneObj) {
  const T = window.THREE;
  const bone = findObjectByNameLoose(sceneObj, 'shinglebone');
  let boneLength = 1, boneFrameInverse = null;
  if (bone) {
    bone.visible = false;
    sceneObj.updateWorldMatrix(true, true);
    bone.updateWorldMatrix(true, true);
    const pos = new T.Vector3(), quat = new T.Quaternion(), scale = new T.Vector3();
    bone.matrixWorld.decompose(pos, quat, scale);
    boneLength = Math.max(Math.abs(scale.x), 0.001);
    const frame = new T.Matrix4().compose(pos, quat, new T.Vector3(1,1,1));
    boneFrameInverse = frame.clone().invert();
  } else {
    const box = new T.Box3().setFromObject(sceneObj);
    const size = box.getSize(new T.Vector3());
    boneLength = Math.max(size.x, size.y, size.z, 1);
  }
  return { scene: sceneObj, bone, boneLength, boneFrameInverse };
}

function faceNormalFromVerts(v) {
  const T = window.THREE;
  const a = new T.Vector3(...v[0]), b = new T.Vector3(...v[1]), c = new T.Vector3(...v[2]);
  return b.clone().sub(a).cross(c.clone().sub(a)).normalize();
}

function faceCenterFromVerts(v) {
  const T = window.THREE;
  const c = new T.Vector3();
  for (const p of v) c.add(new T.Vector3(...p));
  return c.multiplyScalar(1 / v.length);
}

function roofFaceFrame(face, config) {
  const T = window.THREE;
  const p0 = new T.Vector3(...face.v[0]), p1 = new T.Vector3(...face.v[1]),
        p2 = new T.Vector3(...face.v[2]), p3 = new T.Vector3(...face.v[3]);
  const n = faceNormalFromVerts(face.v);
  const uMidA = p0.clone().lerp(p3, 0.5), uMidB = p1.clone().lerp(p2, 0.5);
  const vMidA = p0.clone().lerp(p1, 0.5), vMidB = p3.clone().lerp(p2, 0.5);
  const uVec = uMidB.clone().sub(uMidA), vVec = vMidB.clone().sub(vMidA);
  const lengthA = config.direction === 'v' ? vMidA : uMidA;
  const lengthB = config.direction === 'v' ? vMidB : uMidB;
  const acrossVec = config.direction === 'v' ? uVec : vVec;
  const spineOrigin = (lengthA.y >= lengthB.y ? lengthA : lengthB).clone();
  const eaveEnd = (lengthA.y >= lengthB.y ? lengthB : lengthA).clone();
  const spineToEave = eaveEnd.clone().sub(spineOrigin);
  const baseLength = Math.max(0.001, spineToEave.length());
  let dir = spineToEave.clone();
  if (dir.lengthSq() < 1e-10) dir = (config.direction === 'v' ? vVec : uVec).clone();
  if (dir.lengthSq() < 1e-10) dir = new T.Vector3(1, 0, 0);
  dir.normalize();
  const useWallOrigin = !!config.wallOriginReach;
  const reachOrigin = useWallOrigin ? eaveEnd.clone() : spineOrigin.clone();
  const reachDir = useWallOrigin ? dir.clone().multiplyScalar(-1) : dir.clone();
  const reach = Math.max(0, finite(config.overhang, 1));
  const length = Math.max(0.001, baseLength * reach);
  const center = reachOrigin.clone().add(reachDir.clone().multiplyScalar(length * 0.5));
  const scaleOrigin = spineOrigin.clone().add(dir.clone().multiplyScalar(baseLength * 0.5));
  let across = acrossVec.clone();
  const acrossLen = Math.max(0.001, across.length());
  if (across.lengthSq() < 1e-10) across = new T.Vector3(0, 0, 1);
  across.normalize();
  return { center, n, dir: reachDir, spineToEaveDir: dir, across, length, baseLength, reach, acrossLen, spineOrigin, eaveEnd, reachOrigin, scaleOrigin };
}

function roofTargetsForFace(face, config) {
  const T = window.THREE;
  const frame = roofFaceFrame(face, config);
  const count = Math.max(1, Math.floor(frame.acrossLen / config.tubeSpacing) + 1);
  const step = count > 1 ? frame.acrossLen / (count - 1) : 0;
  const faceOffset = finite(face.roofAcrossOffset, 0);
  const targets = [];
  for (let i = 0; i < count; i++) {
    const offset = (i - (count - 1) / 2) * step + faceOffset;
    const liftedOffset = frame.across.clone().multiplyScalar(offset)
      .add(frame.n.clone().multiplyScalar(config.lift + config.tubeRadius));
    targets.push({
      position: frame.center.clone().add(liftedOffset),
      scaleOrigin: frame.scaleOrigin.clone().add(liftedOffset),
      spineOrigin: frame.spineOrigin.clone().add(liftedOffset),
      eaveEnd: frame.eaveEnd.clone().add(liftedOffset),
      direction: frame.dir.clone(),
      spineToEaveDirection: frame.spineToEaveDir.clone(),
      reachOrigin: frame.reachOrigin.clone(),
      normal: frame.n.clone(),
      across: frame.across.clone(),
      length: frame.length, baseLength: frame.baseLength, reach: frame.reach,
      radius: config.tubeRadius, index: i, layer: 1
    });
  }
  return targets;
}

function shingleLayerSettings(target, config) {
  const second = target?.layer === 2;
  return {
    reach:    second ? Math.max(0,    finite(config.secondLayerOverhang,       config.overhang))      : Math.max(0,    finite(config.overhang, 1)),
    scaleX:   second ? Math.max(0.01, finite(config.secondLayerShingleScaleX,  config.shingleScaleX)) : Math.max(0.01, finite(config.shingleScaleX, 1)),
    scaleY:   second ? Math.max(0.01, finite(config.secondLayerShingleScaleY,  config.shingleScaleY)) : Math.max(0.01, finite(config.shingleScaleY, 1)),
    scaleZ:   second ? Math.max(0.01, finite(config.secondLayerShingleScaleZ,  config.shingleScaleZ)) : Math.max(0.01, finite(config.shingleScaleZ, 1)),
    rotX:     second ? finite(config.secondLayerShingleRotX, 0)                                       : finite(config.shingleRotX, 0),
    flipX:    second ? !!config.secondLayerFlipX : !!config.flipX,
    flipY:    second ? !!config.secondLayerFlipY : !!config.flipY,
    flipZ:    second ? !!config.secondLayerFlipZ : !!config.flipZ,
    wallOriginReach: second ? !!config.secondLayerWallOriginReach : !!config.wallOriginReach
  };
}

function standardLengthScalePlacement(target, config) {
  const T = window.THREE;
  const layer = shingleLayerSettings(target, config);
  const sx = layer.scaleX;
  const origin = (target.scaleOrigin || target.position || new T.Vector3()).clone();
  const pos = (target.position || origin).clone();
  const scaledPosition = origin.clone().add(pos.clone().sub(origin).multiplyScalar(sx));
  const scaledLength = Math.max(0.001, finite(target.length, 1) * sx);
  return { sx, origin, scaledPosition, scaledLength };
}

function targetQuaternionForRoofTarget(target, config) {
  const T = window.THREE;
  const layer = shingleLayerSettings(target, config);
  const flips = { flipX: layer.flipX, flipY: layer.flipY, flipZ: layer.flipZ };
  const x = (target.direction || new T.Vector3(1,0,0)).clone().normalize();
  let z = (target.normal || new T.Vector3(0,1,0)).clone().normalize();
  let y = z.clone().cross(x).normalize();
  if (y.lengthSq() < 1e-8) y = new T.Vector3(0,0,1).cross(x).normalize();
  z = x.clone().cross(y).normalize();
  const q = new T.Quaternion().setFromRotationMatrix(new T.Matrix4().makeBasis(x, y, z));
  const qLocal = new T.Quaternion();
  if (flips.flipX) q.multiply(qLocal.setFromAxisAngle(new T.Vector3(1,0,0), Math.PI));
  if (flips.flipY) q.multiply(qLocal.setFromAxisAngle(new T.Vector3(0,1,0), Math.PI));
  if (flips.flipZ) q.multiply(qLocal.setFromAxisAngle(new T.Vector3(0,0,1), Math.PI));
  const rx = T.MathUtils.degToRad(finite(layer.rotX, 0));
  if (Math.abs(rx) > 1e-8) q.multiply(qLocal.setFromAxisAngle(new T.Vector3(1,0,0), rx));
  const zRotSign = flips.flipX ? -1 : 1;
  const rz = T.MathUtils.degToRad(finite(config.shingleRotZ, 0)) * zRotSign;
  if (Math.abs(rz) > 1e-8) q.multiply(qLocal.setFromAxisAngle(new T.Vector3(0,0,1), rz));
  return q;
}

function makeTubePreview(target, config) {
  const T = window.THREE;
  const placement = standardLengthScalePlacement(target, config);
  const mesh = new T.Mesh(
    new T.CylinderGeometry(target.radius, target.radius, placement.scaledLength, 8, 1, true),
    new T.MeshLambertMaterial({ color: 0xd8bd7d })
  );
  mesh.position.copy(placement.scaledPosition);
  mesh.quaternion.setFromUnitVectors(new T.Vector3(0,1,0), target.direction.clone().normalize());
  return mesh;
}

function makeShingleInstance(target, config) {
  const T = window.THREE;
  const tpl = shingleTemplate;
  if (!tpl) return makeTubePreview(target, config);
  const wrapper = new T.Group();
  const clone = tpl.scene.clone(true);
  clone.traverse(o => { if (String(o.name||'').toLowerCase() === 'shinglebone') o.visible = false; });
  const placement = standardLengthScalePlacement(target, config);
  const stretch = target.length / Math.max(0.001, tpl.boneLength);
  const q = targetQuaternionForRoofTarget({...target, rotationOrigin: placement.scaledPosition}, config);
  wrapper.position.copy(placement.scaledPosition);
  wrapper.quaternion.copy(q);
  const layer = shingleLayerSettings(target, config);
  wrapper.scale.set(stretch * placement.sx, layer.scaleY, layer.scaleZ);
  if (tpl.boneFrameInverse) {
    clone.matrix.copy(tpl.boneFrameInverse);
    clone.matrixAutoUpdate = false;
  }
  wrapper.add(clone);
  return wrapper;
}

function cloneRoofTargetWithLayerOffset(target, config) {
  const T = window.THREE;
  const across = (target.across || new T.Vector3(0,0,1)).clone().normalize();
  const normal = (target.normal || new T.Vector3(0,1,0)).clone().normalize();
  const spineToEaveDir = (target.spineToEaveDirection || target.direction || new T.Vector3(1,0,0)).clone().normalize();
  const layerOffset = across.clone().multiplyScalar(config.secondLayerAcross)
    .add(normal.clone().multiplyScalar(config.secondLayerLift));
  const spine = (target.spineOrigin || target.position || new T.Vector3()).clone().add(layerOffset);
  const eave = target.eaveEnd
    ? target.eaveEnd.clone().add(layerOffset)
    : spine.clone().add(spineToEaveDir.clone().multiplyScalar(finite(target.baseLength, target.length || 1)));
  const baseLength = Math.max(0.001, finite(target.baseLength, target.length || 1));
  const useWallOrigin = !!config.secondLayerWallOriginReach;
  const reachOrigin = useWallOrigin ? eave.clone() : spine.clone();
  const dir = useWallOrigin ? spineToEaveDir.clone().multiplyScalar(-1) : spineToEaveDir.clone();
  const reach = Math.max(0, finite(config.secondLayerOverhang, config.overhang));
  const length = Math.max(0.001, baseLength * reach);
  const position = reachOrigin.clone().add(dir.clone().multiplyScalar(length * 0.5));
  const scaleOrigin = spine.clone().add(spineToEaveDir.clone().multiplyScalar(baseLength * 0.5));
  return { ...target, position, scaleOrigin, spineOrigin: spine, eaveEnd: eave, reachOrigin,
    length, reach, normal: normal.clone(), across: across.clone(),
    direction: dir.clone(), spineToEaveDirection: spineToEaveDir.clone(), layer: 2 };
}

function alignRoofFaceGroupToEavePlaneCenter(face, group, config) {
  const T = window.THREE;
  if (!group || !group.children.length) return;
  const frame = roofFaceFrame(face, config);
  const dir = frame.dir.clone().normalize();
  const across = frame.across.clone().normalize();
  const desired = faceCenterFromVerts(face.v);
  group.updateWorldMatrix(true, true);
  const box = new T.Box3().setFromObject(group);
  if (!Number.isFinite(box.min.x) || !Number.isFinite(box.max.x)) return;
  const actual = box.getCenter(new T.Vector3());
  const deltaDir = desired.dot(dir) - actual.dot(dir);
  const deltaAcross = desired.dot(across) - actual.dot(across);
  const move = dir.multiplyScalar(deltaDir).add(across.multiplyScalar(deltaAcross));
  if (move.lengthSq() > 1e-12) group.position.add(move);
}

const HIGHLAND_SHINGLE_CONFIG = {
  tubeRadius: 0.08, tubeSpacing: 0.5, overhang: 1.25, wallOriginReach: true,
  direction: 'u', lift: 0.04,
  flipX: true, flipY: false, flipZ: false,
  shingleScaleX: 1.2, shingleScaleY: 1.2, shingleScaleZ: 2, shingleRotX: -10, shingleRotZ: 0,
  peakRotate: false, peakRotateAway: false, peakRotateStrength: 0, peakRotateFalloff: 0,
  secondLayer: true, secondLayerAcross: 0.25, secondLayerLift: 0,
  secondLayerWallOriginReach: false, secondLayerOverhang: 1,
  secondLayerShingleScaleX: 1.5, secondLayerShingleScaleY: 1.2, secondLayerShingleScaleZ: 2,
  secondLayerShingleRotX: 0, secondLayerPeakRotateAway: false,
  secondLayerFlipX: true, secondLayerFlipY: false, secondLayerFlipZ: false,
  highlandInterlockOffset: 0.25
};

function addShinglesForRoofFace(parentGroup, eaveLeft, ridgeLeft, ridgeRight, eaveRight) {
  // eaveLeft/ridgeLeft/ridgeRight/eaveRight are THREE.Vector3 corners of the roof slope.
  // face.v winding: [eaveLeft, ridgeLeft, ridgeRight, eaveRight]
  // roofFaceFrame with direction:'u' treats v0-v3 edge as "u" axis → uMidA=eave center, uMidB=ridge center.
  const face = {
    v: [[eaveLeft.x,eaveLeft.y,eaveLeft.z],[ridgeLeft.x,ridgeLeft.y,ridgeLeft.z],
        [ridgeRight.x,ridgeRight.y,ridgeRight.z],[eaveRight.x,eaveRight.y,eaveRight.z]],
    roofAcrossOffset: 0
  };
  const config = HIGHLAND_SHINGLE_CONFIG;
  const faceGroup = new window.THREE.Group();
  for (const t of roofTargetsForFace(face, config)) {
    faceGroup.add(makeShingleInstance(t, config));
    if (config.secondLayer) {
      faceGroup.add(makeShingleInstance(cloneRoofTargetWithLayerOffset(t, config), config));
    }
  }
  alignRoofFaceGroupToEavePlaneCenter(face, faceGroup, config);
  parentGroup.add(faceGroup);
}

const mats3d = () => {
  const T = window.THREE;
  return {
    ground: new T.MeshLambertMaterial({ color: 0x28402d }),
    plaster: new T.MeshLambertMaterial({ color: 0xbda579 }),
    roof: new T.MeshLambertMaterial({ color: 0x5a3725 }),
    ridge: new T.MeshLambertMaterial({ color: 0x3c2418 }),
    gable: new T.MeshLambertMaterial({ color: 0x846344 }),
    door: new T.MeshLambertMaterial({ color: 0x4a2d1d }),
    glass: new T.MeshLambertMaterial({ color: 0x8fbcd4, transparent:true, opacity:0.55 }),
    path: new T.MeshBasicMaterial({ color: 0x38bdf8 }),
    shingleFb: new T.MeshLambertMaterial({ color: 0x4b2d1e }),
    brick: new T.MeshLambertMaterial({ color: 0x9b6b48 })
  };
};
let _mats3d = null;
function getMats() { if (!_mats3d) _mats3d = mats3d(); return _mats3d; }

function mkBox(w,h,d,mat,x,y,z) { const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; return m; }
function qMesh(a,b,c,d,mat,name) {
  const T=window.THREE, geo=new T.BufferGeometry();
  geo.setAttribute('position',new T.Float32BufferAttribute([a.x,a.y,a.z,b.x,b.y,b.z,c.x,c.y,c.z,a.x,a.y,a.z,c.x,c.y,c.z,d.x,d.y,d.z],3));
  geo.computeVertexNormals(); const m=new T.Mesh(geo,mat); m.name=name||'q'; m.castShadow=true; m.receiveShadow=true; return m;
}
function corners(rect,y) {
  const T=window.THREE;
  return { a:new T.Vector3(rect.minX,y,rect.minZ), b:new T.Vector3(rect.maxX,y,rect.minZ), c:new T.Vector3(rect.maxX,y,rect.maxZ), d:new T.Vector3(rect.minX,y,rect.maxZ) };
}
function eaveRect(bottom) {
  const cx=(bottom.minX+bottom.maxX)/2, cz=(bottom.minZ+bottom.maxZ)/2;
  const hw=(bottom.maxX-bottom.minX)*BODY_SCALE/2, hd=(bottom.maxZ-bottom.minZ)*BODY_SCALE/2;
  return { minX:cx-hw, maxX:cx+hw, minZ:cz-hd, maxZ:cz+hd };
}
function ridgeRect(bottom, eave, axis) {
  const cx=(eave.minX+eave.maxX)/2, cz=(eave.minZ+eave.maxZ)/2;
  const esW=eave.maxX-eave.minX, esD=eave.maxZ-eave.minZ;
  const bsW=bottom.maxX-bottom.minX, bsD=bottom.maxZ-bottom.minZ;
  const tLen = axis==='x' ? Math.max(MIN_RIDGE,esW*BODY_SCALE) : Math.max(MIN_RIDGE,esD*BODY_SCALE);
  const shrink = axis==='x' ? Math.max(0,(esW-tLen)/2) : Math.max(0,(esD-tLen)/2);
  const insetPH = axis==='x' ? Math.max(0,(bsW-esW)/2)/BASE_H : Math.max(0,(bsD-esD)/2)/BASE_H;
  const rh = (insetPH>1e-7&&shrink>1e-7) ? Math.max(0.2,shrink/insetPH) : 1.18;
  if (axis==='x') return { rect:{minX:cx-tLen/2,maxX:cx+tLen/2,minZ:cz-MIN_RIDGE/2,maxZ:cz+MIN_RIDGE/2}, rh };
  return { rect:{minX:cx-MIN_RIDGE/2,maxX:cx+MIN_RIDGE/2,minZ:cz-tLen/2,maxZ:cz+tLen/2}, rh };
}

function addBrickFallback(group, bl, tl, tr, br, faceW, faceH, name) {
  const T=window.THREE, m=getMats();
  const cols=Math.max(3,Math.floor(faceW/0.32)), rows=Math.max(3,Math.floor(faceH/0.24));
  const geo=new T.BoxGeometry(0.24,0.14,0.08);
  const inst=new T.InstancedMesh(geo,m.brick,cols*rows); inst.name='bricks_'+name;
  const u=br.clone().sub(bl).normalize(), v=tl.clone().sub(bl).normalize();
  const n=new T.Vector3().crossVectors(u,v).normalize().multiplyScalar(0.035);
  const q=new T.Quaternion().setFromRotationMatrix(new T.Matrix4().makeBasis(u,v,n.clone().normalize()));
  let k=0;
  for (let r=0;r<rows;r++) for (let c=0;c<cols;c++) {
    const s=(c+0.5+(r%2)*0.5)/cols, t=(r+0.5)/rows;
    const p0=bl.clone().lerp(br,s), p1=tl.clone().lerp(tr,s);
    const p=p0.lerp(p1,t).add(n);
    const scl=new T.Vector3(faceW/cols*0.78,faceH/rows*0.58,0.08);
    inst.setMatrixAt(k++,new T.Matrix4().compose(p,q,scl));
  }
  inst.instanceMatrix.needsUpdate=true; inst.castShadow=true; group.add(inst);
}

function build3dHouse(h) {
  const T=window.THREE, m=getMats(), group=new T.Group(); group.name='house_'+h.id;
  const bot = { minX:h.x, maxX:h.x+h.width, minZ:h.y, maxZ:h.y+h.depth };
  const eave = eaveRect(bot);
  const axis = h.width >= h.depth ? 'x' : 'z';
  const b=corners(bot,0), e=corners(eave,BASE_H);

  // Structure shell (plaster under bricks)
  group.add(qMesh(b.a,b.b,b.c,b.d,m.plaster,'floor'));
  group.add(qMesh(e.d,e.c,e.b,e.a,m.plaster,'ceil'));
  group.add(qMesh(b.a,e.a,e.b,b.b,m.plaster,'wall_n'));
  group.add(qMesh(b.b,e.b,e.c,b.c,m.plaster,'wall_e'));
  group.add(qMesh(b.c,e.c,e.d,b.d,m.plaster,'wall_s'));
  group.add(qMesh(b.d,e.d,e.a,b.a,m.plaster,'wall_w'));

  // Brick walls — WallBuilder if loaded, InstancedMesh box bricks as fallback
  if (wallBuilder) {
    const panels = [
      { id:'n', width:h.width, height:BASE_H, position:[bot.minX+h.width/2, 0, bot.minZ], rotationDeg:[0,0,0] },
      { id:'e', width:h.depth, height:BASE_H, position:[bot.maxX, 0, bot.minZ+h.depth/2], rotationDeg:[0,-90,0] },
      { id:'s', width:h.width, height:BASE_H, position:[bot.minX+h.width/2, 0, bot.maxZ], rotationDeg:[0,180,0] },
      { id:'w', width:h.depth, height:BASE_H, position:[bot.minX, 0, bot.minZ+h.depth/2], rotationDeg:[0,90,0] }
    ];
    try { group.add(wallBuilder.build(panels, { unitMult:0.3, usePlaceholder:true })); }
    catch(_) {
      addBrickFallback(group,b.a,e.a,e.b,b.b,h.width,BASE_H,'n');
      addBrickFallback(group,b.b,e.b,e.c,b.c,h.depth,BASE_H,'e');
      addBrickFallback(group,b.c,e.c,e.d,b.d,h.width,BASE_H,'s');
      addBrickFallback(group,b.d,e.d,e.a,b.a,h.depth,BASE_H,'w');
    }
  } else {
    addBrickFallback(group,b.a,e.a,e.b,b.b,h.width,BASE_H,'n');
    addBrickFallback(group,b.b,e.b,e.c,b.c,h.depth,BASE_H,'e');
    addBrickFallback(group,b.c,e.c,e.d,b.d,h.width,BASE_H,'s');
    addBrickFallback(group,b.d,e.d,e.a,b.a,h.depth,BASE_H,'w');
  }

  // Roof structure
  const { rect:rRect, rh } = ridgeRect(bot, eave, axis);
  const top = corners(rRect, BASE_H+rh);
  group.add(qMesh(top.d,top.c,top.b,top.a,m.ridge,'ridge'));
  if (axis==='x') {
    group.add(qMesh(e.a,top.a,top.b,e.b,m.roof,'roof_n'));
    group.add(qMesh(e.c,top.c,top.d,e.d,m.roof,'roof_s'));
    group.add(qMesh(e.b,top.b,top.c,e.c,m.gable,'gable_e'));
    group.add(qMesh(e.d,top.d,top.a,e.a,m.gable,'gable_w'));
    // Shingles via proper shinglebone pipeline
    addShinglesForRoofFace(group, e.a, top.a, top.b, e.b);
    addShinglesForRoofFace(group, e.c, top.c, top.d, e.d);
  } else {
    group.add(qMesh(e.b,top.b,top.c,e.c,m.roof,'roof_e'));
    group.add(qMesh(e.d,top.d,top.a,e.a,m.roof,'roof_w'));
    group.add(qMesh(e.a,top.a,top.b,e.b,m.gable,'gable_n'));
    group.add(qMesh(e.c,top.c,top.d,e.d,m.gable,'gable_s'));
    addShinglesForRoofFace(group, e.b, top.b, top.c, e.c);
    addShinglesForRoofFace(group, e.d, top.d, top.a, e.a);
  }

  const door = deriveDoor(h); group.add(mkBox(0.8,1.25,0.08,m.door,door.x+.5,.72,door.y+.05));
  group.add(mkBox(0.52,0.42,0.06,m.glass,h.x+h.width*.27,1.25,h.y+h.depth+.04));
  group.add(mkBox(0.52,0.42,0.06,m.glass,h.x+h.width*.73,1.25,h.y+h.depth+.04));
  return group;
}

function rebuildScene() {
  if (!renderer3d) return;
  const T=window.THREE, m=getMats();
  while (groundLayer.children.length) groundLayer.children[0].parent.remove(groundLayer.children[0]);
  while (buildingLayer.children.length) buildingLayer.children[0].parent.remove(buildingLayer.children[0]);
  while (pathLayer.children.length) pathLayer.children[0].parent.remove(pathLayer.children[0]);
  const gnd=new T.Mesh(new T.PlaneGeometry(state.map.cols,state.map.rows),m.ground);
  gnd.rotation.x=-Math.PI/2; gnd.position.set(state.map.cols/2,0,state.map.rows/2); gnd.receiveShadow=true; groundLayer.add(gnd);
  const grid=new T.GridHelper(Math.max(state.map.cols,state.map.rows),Math.max(state.map.cols,state.map.rows),0x31516b,0x1b2e3f);
  grid.position.set(state.map.cols/2,0.01,state.map.rows/2); groundLayer.add(grid);
  state.houses.forEach(h => buildingLayer.add(build3dHouse(h)));
  state.npcPaths.forEach(p => {
    if (!p.nodes || p.nodes.length < 2) return;
    const pts=p.nodes.map(n => new T.Vector3(n.x+.5,0.07,n.y+.5));
    const geo=new T.BufferGeometry().setFromPoints(pts);
    pathLayer.add(new T.Line(geo,m.path));
  });
  orbitCtrl.target.set(state.map.cols/2,0,state.map.rows/2); updateCamera3d();
}

let _lastSig = '';
function emit3d() {
  if (currentView !== '3d') return;
  const sig = JSON.stringify({ h:state.houses, p:state.npcPaths, cols:state.map.cols, rows:state.map.rows });
  if (sig !== _lastSig) { _lastSig = sig; rebuildScene(); }
}

// ── Walk Preview ──────────────────────────────────────────────────────────────

const wrapWalk = $('wrapWalk');
let rendererW, sceneW, cameraW;
let walkPlayer = { x:24, z:16, angle:0 };
const walkKeys = {};
const WALK_SPEED = 0.07;

function initWalk() {
  if (rendererW) return;
  const T=window.THREE;
  sceneW = new T.Scene(); sceneW.background=new T.Color(0x071018); sceneW.fog=new T.Fog(0x071018,20,60);
  cameraW = new T.PerspectiveCamera(68, 1, 0.05, 120);
  rendererW = new T.WebGLRenderer({ antialias:true }); rendererW.setPixelRatio(Math.min(2,window.devicePixelRatio||1)); rendererW.shadowMap.enabled=true;
  wrapWalk.appendChild(rendererW.domElement); rendererW.domElement.style.cssText='width:100%;height:100%;display:block;cursor:none';
  sceneW.add(new T.HemisphereLight(0xddeeff,0x22331f,1.1));
  const sun=new T.DirectionalLight(0xffffff,1.0); sun.position.set(12,28,10); sun.castShadow=true; sceneW.add(sun);
  animateWalk();
}
function resizeWalk() {
  if (!rendererW) { initWalk(); }
  const r=wrapWalk.getBoundingClientRect();
  rendererW.setSize(Math.max(1,r.width),Math.max(1,r.height),false);
  cameraW.aspect=Math.max(1,r.width)/Math.max(1,r.height); cameraW.updateProjectionMatrix();
}

function rebuildWalkScene() {
  if (!sceneW) return;
  while (sceneW.children.length > 3) sceneW.remove(sceneW.children[sceneW.children.length-1]);
  const T=window.THREE, m=getMats();
  const gnd=new T.Mesh(new T.PlaneGeometry(state.map.cols,state.map.rows),m.ground);
  gnd.rotation.x=-Math.PI/2; gnd.position.set(state.map.cols/2,0,state.map.rows/2); gnd.receiveShadow=true; sceneW.add(gnd);
  const grid=new T.GridHelper(Math.max(state.map.cols,state.map.rows),Math.max(state.map.cols,state.map.rows),0x31516b,0x1b2e3f);
  grid.position.set(state.map.cols/2,0.01,state.map.rows/2); sceneW.add(grid);
  state.houses.forEach(h => sceneW.add(build3dHouse(h)));
}
function startWalk() {
  if (!rendererW) initWalk();
  rebuildWalkScene();
  walkPlayer.x = state.map.cols / 2; walkPlayer.z = state.map.rows * 0.75;
  walkPlayer.angle = 0;
}

function houseAABBs() {
  return state.houses.map(h => ({ minX:h.x, maxX:h.x+h.width, minZ:h.y, maxZ:h.y+h.depth }));
}
function isInsideHouse(x, z) {
  return houseAABBs().some(b => x > b.minX+.2 && x < b.maxX-.2 && z > b.minZ+.2 && z < b.maxZ-.2);
}

function animateWalk() {
  if (currentView !== 'walk') { requestAnimationFrame(animateWalk); return; }
  const T=window.THREE;
  let moved=false, dx=0, dz=0;
  if (walkKeys['KeyW']||walkKeys['ArrowUp'])    { dz -= Math.cos(walkPlayer.angle); dx -= Math.sin(walkPlayer.angle); moved=true; }
  if (walkKeys['KeyS']||walkKeys['ArrowDown'])  { dz += Math.cos(walkPlayer.angle); dx += Math.sin(walkPlayer.angle); moved=true; }
  if (walkKeys['KeyA']||walkKeys['ArrowLeft'])  { walkPlayer.angle += 0.04; }
  if (walkKeys['KeyD']||walkKeys['ArrowRight']) { walkPlayer.angle -= 0.04; }
  if (moved) {
    const nx = walkPlayer.x + dx*WALK_SPEED, nz = walkPlayer.z + dz*WALK_SPEED;
    const inBounds = nx > 0 && nx < state.map.cols && nz > 0 && nz < state.map.rows;
    if (inBounds && !isInsideHouse(nx, nz)) { walkPlayer.x = nx; walkPlayer.z = nz; }
  }
  const camDist=3.2, camHeight=1.8;
  cameraW.position.set(
    walkPlayer.x + Math.sin(walkPlayer.angle)*camDist,
    camHeight,
    walkPlayer.z + Math.cos(walkPlayer.angle)*camDist
  );
  cameraW.lookAt(new T.Vector3(walkPlayer.x, 1.0, walkPlayer.z));
  $('walkPosPill').textContent = `pos: ${walkPlayer.x.toFixed(1)}, ${walkPlayer.z.toFixed(1)}`;
  resizeWalk();
  rendererW.render(sceneW, cameraW);
  requestAnimationFrame(animateWalk);
}

window.addEventListener('keydown', e => {
  walkKeys[e.code] = true;
  if (e.code === 'Escape' && currentView === 'walk') { setView('3d'); }
  if (e.code === 'Escape' && currentView === '3d') { setView('2d'); }
});
window.addEventListener('keyup', e => { walkKeys[e.code] = false; });

// ── Wire up UI ────────────────────────────────────────────────────────────────

$('btn2d').addEventListener('click', () => setView('2d'));
$('btn3d').addEventListener('click', () => { init3d(); setView('3d'); });
$('btnWalk').addEventListener('click', () => { initWalk(); setView('walk'); });
$('exitWalkBtn').addEventListener('click', () => setView('3d'));

document.querySelectorAll('#modeBar button[data-mode]').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
$('fitBtn').addEventListener('click', fitView);
$('applyMapBtn').addEventListener('click', () => {
  state.map.cols = clamp(Math.round(num('mapCols',48)),8,200);
  state.map.rows = clamp(Math.round(num('mapRows',32)),8,200);
  fitView(); setStatus('Applied.'); updateAll();
});

$('addHouseBtn').addEventListener('click', () => addHouseAt());
$('updateHouseBtn').addEventListener('click', updateHouse);
$('deleteHouseBtn').addEventListener('click', deleteHouse);
$('newPathBtn').addEventListener('click', newPath);
$('addNodeBtn').addEventListener('click', () => addNodeAt());
$('updatePathBtn').addEventListener('click', updatePath);
$('deletePathBtn').addEventListener('click', deletePathOrNode);
$('addSchedBtn').addEventListener('click', addSched);
$('deleteSchedBtn').addEventListener('click', deleteSched);
$('resetClockBtn').addEventListener('click', () => { simMinutes = 480; $('clockReadout').textContent = '08:00'; });

$('exportBtn').addEventListener('click', exportJson);
$('copyBtn').addEventListener('click', copyJson);
$('importBtn').addEventListener('click', () => $('importFile').click());
$('importFile').addEventListener('change', async e => {
  const f = e.target.files?.[0]; if (!f) return;
  try { importJson(JSON.parse(await f.text())); } catch (err) { setStatus('Import failed: ' + err.message); }
  finally { e.target.value = ''; }
});
$('seedBtn').addEventListener('click', loadStarter);
$('resetBtn').addEventListener('click', () => { if (confirm('Clear all data?')) importJson({ map:{ id:'hobunji_main_town', name:'Hobunji Main Town', cols:48, rows:32 }, houses:[], npcPaths:[], npcSchedules:[] }); });

window.addEventListener('resize', () => {
  resizeCanvas();
  if (currentView === '3d') resize3d();
  if (currentView === 'walk') resizeWalk();
});

window.addEventListener('error', e => setStatus(`Error: ${e.message}`));
window.addEventListener('unhandledrejection', e => setStatus(`Promise: ${e.reason?.message || e.reason}`));

// ── Editor Bridge (for hub integration) ──────────────────────────────────────
window._editorBridge = {
  selectNpc(npcId) {
    const p = state.npcPaths.find(x => x.npcId === npcId);
    if (p) { activePathId = p.id; fillPathForm(p); selectThing('path', p.id); }
    const s = state.npcSchedules.find(x => x.npcId === npcId);
    if (s) fillSchedForm(s);
    $('schedNpcId').value = npcId; $('pathNpcId').value = npcId;
  },
  getState() { return buildExport(); },
  setMapData(obj) { try { importJson(obj); } catch(e) { setStatus('Bridge import failed.'); } }
};

// ── Init ──────────────────────────────────────────────────────────────────────
resizeCanvas(); fitView(); loadStarter(); requestAnimationFrame(tickClock);
})();
</script>
</body>
