    function renderCollections() {
      const acc = window.ScratchbonesAccount;
      const fullCatalog = acc.getShopCatalog();
      const dyes = acc.getDyeCatalog();
      const dyeCategories = acc.getDyeCategories();
      const appliedDyes = acc.getAppliedDyes();
      const npc = activeNpc();

      const CLOTHING_SLOTS = [
        { key: 'hat',      label: 'Hat',      category: 'hat',      tintKeys: ['HAT',   'HAT_B',   'HAT_C'] },
        { key: 'hood',     label: 'Hood',     category: 'hood',     tintKeys: ['HOOD',  'HOOD_B',  'HOOD_C'] },
        { key: 'torso',    label: 'Torso',    category: 'torso',    tintKeys: ['TORSO', 'TORSO_B', 'TORSO_C'] },
        { key: 'overwear', label: 'Overwear', category: 'overwear', tintKeys: ['CLOTH', 'CLOTH_B', 'CLOTH_C'] },
      ];
      const DYE_SWATCH_BASE = window.SCRATCHBONES_CONFIG?.game?.dyes?.swatchBase;

      // All dyes are available (no ownership filter in this dev tool)
      const ownedDyes = dyes;
      const appearance = acc.getAppearance();
      const appearanceSlotDefs = window.SCRATCHBONES_CONFIG?.game?.collections?.appearanceSlots || [];
      const genderData = SPECIES_DATA[appearance.speciesId]?.[appearance.gender] || null;
      const appearanceSlots = appearanceSlotDefs
        .filter(slot => !Array.isArray(slot.species) || slot.species.includes(appearance.speciesId))
        .map(slot => ({ ...slot, options: (genderData?.slots || []).find(def => def.slot === slot.slot)?.options || [] }))
        .filter(slot => slot.options.length);

      const entitlementKey = (item) => [item.category || '', item.label || '', item.material || ''].join('::');

      let slotsHtml = '';

      // Appearance-linked slots (e.g. upperFace for rakakoan)
      for (const slot of appearanceSlots) {
        const equippedId = appearance.cosmetics?.[slot.slot] || slot.options[0]?.id || '';
        const opts = slot.options.map(item =>
          `<option value="${esc(item.id || '')}"${(item.id || '') === equippedId ? ' selected' : ''}>${esc(item.label)}</option>`
        ).join('');
        const isDyeOpen = _activeDyeSlot === slot.key;
        slotsHtml += `
          <div class="sb-slot-row">
            <span class="sb-slot-label">${esc(slot.label)}</span>
            <select class="sb-cosmetic-select sb-slot-select" data-appearance-slot="${esc(slot.slot)}">${opts}</select>
            <button class="sb-btn-ghost sb-dye-toggle${isDyeOpen ? ' active' : ''}" data-toggle-dye="${esc(slot.key)}">Dye ▾</button>
          </div>`;
        if (isDyeOpen) {
          const tintKeys = slot.tintKeys || [];
          const dyesForSlot = ownedDyes.filter(d => (d.group || 'cloth') === (slot.dyeGroup || 'cloth'));
          const dyeRowHtml = (d) => {
            const color = d.color || { h: 0, s: 0, v: 0 };
            const style = swatchStyle(DYE_SWATCH_BASE, color.h, color.s, color.v);
            return `
              <div class="sb-dye-row">
                <span class="sb-dye-dot" style="${style}"></span>
                <span class="sb-dye-name">${esc(d.label)}</span>
                ${tintKeys.map((key, index) => `<button class="sb-apply-btn${appliedDyes[key] === d.id ? ' applied' : ''}" data-apply-dye="${esc(d.id)}" data-tint-key="${esc(key)}">${['A','B','C'][index] || index + 1}</button>`).join('')}
              </div>`;
          };
          const sortDyes = list => [...list].sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
          const dyeRows = sortDyes(dyesForSlot).map(dyeRowHtml).join('') || '<div class="sb-muted" style="font-size:0.8em;">No dyes.</div>';
          const clearBtns = tintKeys.filter(k => appliedDyes[k]).map((k, i) =>
            `<button class="sb-btn-ghost sb-apply-btn" data-clear-channel="${esc(k)}">Clear ${['A','B','C'][i] || i + 1}</button>`
          ).join('');
          slotsHtml += `
            <div class="sb-dye-panel">
              ${dyeRows}
              ${clearBtns ? `<div class="sb-dye-clears">${clearBtns}</div>` : ''}
            </div>`;
        }
      }

      // Clothing slots (hat, hood, torso, overwear) — all items unlocked
      for (const slot of CLOTHING_SLOTS) {
        const equippedId = acc.getEquippedForCategory(slot.category);
        const ownedByCategory = fullCatalog.filter(item => item.category === slot.category);
        const ownedMap = new Map();
        for (const item of ownedByCategory) {
          const key = entitlementKey(item);
          const prev = ownedMap.get(key);
          if (!prev) { ownedMap.set(key, item); continue; }
          const score = (x) => (x.species === appearance.speciesId ? 2 : 0) + (x.gender === appearance.gender ? 1 : 0);
          const prevIsEquipped = prev.id === equippedId;
          const itemIsEquipped = item.id === equippedId;
          if ((itemIsEquipped && !prevIsEquipped) || (itemIsEquipped === prevIsEquipped && score(item) > score(prev))) {
            ownedMap.set(key, item);
          }
        }
        const ownedItems = [...ownedMap.values()];
        const equippedItem = fullCatalog.find(c => c.id === equippedId);
        const equippedMaterial = equippedItem?.material || 'cloth';
        const opts = [
          `<option value="">None</option>`,
          ...ownedItems.map(item =>
            `<option value="${esc(item.id)}"${item.id === equippedId ? ' selected' : ''}>${esc(item.label)}</option>`
          ),
        ].join('');
        const slotEmpty = !ownedItems.length && !equippedId;
        const isDyeOpen = _activeDyeSlot === slot.key;
        slotsHtml += `
          <div class="sb-slot-row">
            <span class="sb-slot-label">${esc(slot.label)}</span>
            <select class="sb-cosmetic-select sb-slot-select" data-slot-cat="${slot.category}"${slotEmpty ? ' disabled' : ''}>${opts}</select>
            <button class="sb-btn-ghost sb-dye-toggle${isDyeOpen ? ' active' : ''}" data-toggle-dye="${slot.key}"${slotEmpty ? ' disabled' : ''}>Dye ▾</button>
          </div>`;
        if (isDyeOpen) {
          const [keyA, keyB, keyC] = slot.tintKeys;
          const dyesForSlot = ownedDyes.filter(d => (d.group || 'cloth') === equippedMaterial);
          const dyeRowHtml = (d) => {
            const color = d.color || { h: 0, s: 0, v: 0 };
            const style = swatchStyle(DYE_SWATCH_BASE, color.h, color.s, color.v);
            return `
              <div class="sb-dye-row">
                <span class="sb-dye-dot" style="${style}"></span>
                <span class="sb-dye-name">${esc(d.label)}</span>
                <button class="sb-apply-btn${appliedDyes[keyA] === d.id ? ' applied' : ''}" data-apply-dye="${esc(d.id)}" data-tint-key="${keyA}">A</button>
                <button class="sb-apply-btn${appliedDyes[keyB] === d.id ? ' applied' : ''}" data-apply-dye="${esc(d.id)}" data-tint-key="${keyB}">B</button>
                <button class="sb-apply-btn${appliedDyes[keyC] === d.id ? ' applied' : ''}" data-apply-dye="${esc(d.id)}" data-tint-key="${keyC}">C</button>
              </div>`;
          };
          let dyeRows = '';
          const categoriesById = new Map(dyeCategories.map(c => [c.id, c]));
          const sortDyes = list => [...list].sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
          if (equippedMaterial === 'cloth' && dyeCategories.length) {
            dyeRows = dyeCategories.map(category => {
              const categoryDyes = sortDyes(dyesForSlot.filter(d => d.dyeCategory === category.id));
              if (!categoryDyes.length) return '';
              return `<div class="sb-dye-category">${esc(category.label)}</div>${categoryDyes.map(dyeRowHtml).join('')}`;
            }).join('');
            const uncategorized = sortDyes(dyesForSlot.filter(d => !d.dyeCategory || !categoriesById.has(d.dyeCategory)));
            if (uncategorized.length) dyeRows += uncategorized.map(dyeRowHtml).join('');
          } else {
            dyeRows = sortDyes(dyesForSlot).map(dyeRowHtml).join('');
          }
          if (!dyeRows) dyeRows = '<div class="sb-muted" style="font-size:0.8em;">No dyes.</div>';
          const clearBtns = slot.tintKeys.filter(k => appliedDyes[k]).map((k, i) =>
            `<button class="sb-btn-ghost sb-apply-btn" data-clear-channel="${k}">Clear ${['A','B','C'][i]}</button>`
          ).join('');
          slotsHtml += `
            <div class="sb-dye-panel">
              <div class="sb-muted" style="font-size:0.74em;margin-bottom:5px;">A: primary · B/C: sub-channels</div>
              ${dyeRows}
              ${clearBtns ? `<div class="sb-dye-clears">${clearBtns}</div>` : ''}
            </div>`;
        }
      }

      return `
        <div class="sb-col-layout">
          <div class="sb-col-preview">
            <canvas id="sb-col-canvas" width="200" height="200" class="sb-portrait-canvas"></canvas>
          </div>
          <div class="sb-col-content">
            <div class="sb-label">Clothing &amp; Dyes</div>
            <div class="sb-slot-rows">${slotsHtml || '<div class="sb-muted">No clothing items configured.</div>'}</div>
          </div>
        </div>`;
    }

    // ── Main render ────────────────────────────────────────
    function render() {
      const npc = activeNpc();
      const editorEl = document.getElementById('npe-editor');
      if (!editorEl) return;

      if (!npc) {
        editorEl.innerHTML = `<div class="sb-card"><div class="sb-muted" style="text-align:center;padding:24px 0;">No NPCs yet. Click "+ Add NPC" to create one.</div></div>`;
        renderNpcBar();
        return;
      }

      const tabBar = `
        <div class="npe-tab-bar">
          <button class="npe-tab-btn${_activeTab === 'appearance' ? ' active' : ''}" data-editor-tab="appearance">Appearance</button>
          <button class="npe-tab-btn${_activeTab === 'collections' ? ' active' : ''}" data-editor-tab="collections">Collections</button>
          <button class="npe-tab-btn${_activeTab === 'deform' ? ' active' : ''}" data-editor-tab="deform">Deform</button>
        </div>`;

      let content = '';
      if (_activeTab === 'appearance' && _editAppearance) {
        content = renderAppearance();
      } else if (_activeTab === 'collections') {
        content = renderCollections();
      } else if (_activeTab === 'deform' && _editAppearance) {
        content = renderDeform();
      }

      editorEl.innerHTML = `<div class="sb-card sb-wide-card">${tabBar}${content}</div>`;
      bind();

      if (_activeTab === 'appearance' && _editAppearance) {
        renderPreviewCanvas('sb-ap-canvas', _editAppearance);
      } else if (_activeTab === 'collections') {
        const ap = { ...npc.appearance, equippedCosmetics: npc.equippedCosmetics, appliedDyes: npc.appliedDyes };
        renderPreviewCanvas('sb-col-canvas', ap);
      } else if (_activeTab === 'deform' && _editAppearance) {
        renderPreviewCanvas('sb-deform-portrait', _editAppearance);
        initDeformGrid();
      }

      renderNpcBar();
      updateExportBar();
    }

    function renderNpcBar() {
      const tabsEl = document.getElementById('npe-tabs');
      if (!tabsEl) return;
      tabsEl.innerHTML = _npcs.map((npc, i) => {
        const active = i === _activeNpcIdx;
        const canDel = _npcs.length > 1;
        return `<div class="npe-npc-tab${active ? ' active' : ''}" data-npc-idx="${i}" role="button" tabindex="0">
          ${esc(npc.name || 'NPC')}
          ${canDel ? `<button class="npe-npc-del" data-del-npc="${i}" title="Delete NPC" tabindex="-1">×</button>` : ''}
        </div>`;
      }).join('');
      bindNpcBar();
    }

    function updateExportBar() {
      const npc = activeNpc();
      const label = document.getElementById('npe-active-label');
      if (label) label.textContent = npc ? `Active: ${npc.name || 'NPC'}` : '';
    }

    // ── Bind: NPC bar ──────────────────────────────────────
    function bindNpcBar() {
      document.querySelectorAll('[data-npc-idx]').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.closest('[data-del-npc]')) return;
          const idx = parseInt(el.dataset.npcIdx);
          if (idx === _activeNpcIdx) return;
          saveEditState();
          _activeNpcIdx = idx;
          _activeDyeSlot = null;
          loadEditState();
          render();
        });
        el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') el.click(); });
      });
      document.querySelectorAll('[data-del-npc]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(btn.dataset.delNpc);
          const name = _npcs[idx]?.name || 'this NPC';
          if (!confirm(`Delete ${name}?`)) return;
          _npcs.splice(idx, 1);
          if (_activeNpcIdx >= _npcs.length) _activeNpcIdx = _npcs.length - 1;
          _activeDyeSlot = null;
          loadEditState();
          render();
        });
      });
      document.getElementById('npe-add-btn')?.addEventListener('click', () => {
        saveEditState();
        const npc = makeNpc();
        _npcs.push(npc);
        _activeNpcIdx = _npcs.length - 1;
        _activeDyeSlot = null;
        loadEditState();
        render();
      });
    }

    // ── Bind: editor ───────────────────────────────────────
    function bind() {
      const editorEl = document.getElementById('npe-editor');
      if (!editorEl) return;

      // Tab switching
      editorEl.querySelectorAll('[data-editor-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.dataset.editorTab === _activeTab) return;
          if (_activeTab === 'appearance') saveEditState();
          if (_activeTab === 'deform') saveEditState();
          _activeTab = btn.dataset.editorTab;
          _activeDyeSlot = null;
          if (_activeTab === 'appearance') loadEditState();
          if (_activeTab === 'deform') loadEditState();
          render();
        });
      });

      // ── Appearance editor ──────────────────────────────
      editorEl.querySelectorAll('[data-species]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!_editAppearance) return;
          const sid = btn.dataset.species;
          _editAppearance.speciesId = sid;
          const specData = SPECIES_DATA[sid];
          if (specData && !specData.genders.includes(_editAppearance.gender)) {
            _editAppearance.gender = specData.genders[0];
          }
          _editAppearance.cosmetics = defaultCosmeticsFor(sid, _editAppearance.gender);
          const gData = specData && specData[_editAppearance.gender];
          const opts = gData ? gData.colorOptions : [];
          _editAIdx = 0; _editBIdx = 0;
          if (opts[0]) {
            _editAppearance.bodyColors.A = { h: opts[0].h, s: opts[0].s, v: opts[0].v };
            _editAppearance.bodyColors.B = { h: opts[0].h, s: opts[0].s, v: opts[0].v };
            _editAppearance.bodyColors.C = deriveCFromA(opts[0]);
          }
          _initLoreState(sid, _editAppearance.gender);
          render();
        });
      });

      editorEl.querySelectorAll('[data-subspecies]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!_editAppearance) return;
          const childId = btn.dataset.subspecies;
          const parentId = btn.dataset.parentSpecies;
          const wasActive = _editAppearance.speciesId === childId;
          const newSpeciesId = wasActive ? parentId : childId;
          const newGenderData = SPECIES_DATA[newSpeciesId]?.[_editAppearance.gender];
          const validSlots = new Set((newGenderData?.slots || []).map(s => s.slot));
          const oldCosmetics = { ..._editAppearance.cosmetics };
          const newCosmetics = defaultCosmeticsFor(newSpeciesId, _editAppearance.gender);
          for (const [slot, val] of Object.entries(oldCosmetics)) {
            if (validSlots.has(slot)) newCosmetics[slot] = val;
          }
          _editAppearance.speciesId = newSpeciesId;
          _editAppearance.cosmetics = newCosmetics;
          render();
        });
      });

      editorEl.querySelectorAll('[data-gender]:not([disabled])').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!_editAppearance) return;
          _editAppearance.gender = btn.dataset.gender;
          _editAppearance.cosmetics = defaultCosmeticsFor(_editAppearance.speciesId, _editAppearance.gender);
          const gData = currentSpeciesGenderData();
          const opts = gData ? gData.colorOptions : [];
          _editAIdx = 0; _editBIdx = 0;
          if (opts[0]) {
            _editAppearance.bodyColors.A = { h: opts[0].h, s: opts[0].s, v: opts[0].v };
            _editAppearance.bodyColors.B = { h: opts[0].h, s: opts[0].s, v: opts[0].v };
            _editAppearance.bodyColors.C = deriveCFromA(opts[0]);
          }
          render();
        });
      });

      editorEl.querySelectorAll('.sb-cosmetic-select[data-slot]').forEach(sel => {
        sel.addEventListener('change', () => {
          if (!_editAppearance) return;
          _editAppearance.cosmetics[sel.dataset.slot] = sel.value || null;
          renderPreviewCanvas('sb-ap-canvas', _editAppearance);
        });
      });

      editorEl.querySelectorAll('[data-a-idx]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!_editAppearance) return;
          const idx = parseInt(btn.dataset.aIdx);
          const gData = currentSpeciesGenderData();
          const o = gData && gData.colorOptions[idx];
          if (!o) return;
          _editAIdx = idx;
          _editAppearance.bodyColors.A = { h: o.h, s: o.s, v: o.v };
          _editAppearance.bodyColors.C = deriveCFromA(o);
          editorEl.querySelectorAll('[data-a-idx]').forEach((b, i) => b.classList.toggle('selected', i === idx));
          renderPreviewCanvas('sb-ap-canvas', _editAppearance);
        });
      });

      editorEl.querySelectorAll('[data-b-idx]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!_editAppearance) return;
          const idx = parseInt(btn.dataset.bIdx);
          const gData = currentSpeciesGenderData();
          const o = gData && gData.colorOptions[idx];
          if (!o) return;
          _editBIdx = idx;
          _editAppearance.bodyColors.B = { h: o.h, s: o.s, v: o.v };
          editorEl.querySelectorAll('[data-b-idx]').forEach((b, i) => b.classList.toggle('selected', i === idx));
          renderPreviewCanvas('sb-ap-canvas', _editAppearance);
        });
      });

      // Chat color sliders
      const updateChatPreview = () => {
        if (!_editAppearance) return;
        const hEl = document.getElementById('sb-chat-h');
        const sEl = document.getElementById('sb-chat-s');
        const lEl = document.getElementById('sb-chat-l');
        if (!hEl || !sEl || !lEl) return;
        const h = parseInt(hEl.value), s = parseInt(sEl.value), l = parseInt(lEl.value);
        _editAppearance.chatColor = { h, s, l };
        const prev = document.getElementById('sb-chat-color-preview');
        if (prev) prev.style.background = `hsl(${h},${s}%,${l}%)`;
        const hv = document.getElementById('sb-chat-h-val');
        const sv = document.getElementById('sb-chat-s-val');
        const lv = document.getElementById('sb-chat-l-val');
        if (hv) hv.textContent = h;
        if (sv) sv.textContent = s;
        if (lv) lv.textContent = l;
      };
      ['sb-chat-h', 'sb-chat-s', 'sb-chat-l'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', updateChatPreview);
      });

      // Name format selector
      editorEl.querySelectorAll('[data-name-format]').forEach(btn => {
        btn.addEventListener('click', () => {
          _editNameFormat = btn.dataset.nameFormat;
          editorEl.querySelectorAll('[data-name-format]').forEach(b => b.classList.toggle('selected', b.dataset.nameFormat === _editNameFormat));
          const preview = editorEl.querySelector('.sb-card');
          // Rebuild display name preview in place
          const previewContainer = editorEl.querySelector('[data-name-format].selected')?.closest('.sb-ap-controls')
            ?.querySelector('[style*="rgba(242,208,143,0.06)"]');
          // Fall back to full re-render for simplicity
          render();
        });
      });

      // ── Lore name handlers ──────────────────────────────
      if (_loreState) {
        const adv = window.SCRATCHBONES_NAME_ADVISOR;

        editorEl.querySelectorAll('.sb-lore-input').forEach(input => {
          input.addEventListener('input', () => {
            if (!_loreState) return;
            const slot = input.dataset.loreSlot;
            const ctx = _loreCtx();
            const sp = _loreState.sp;
            const val = input.value;
            const slotEl = input.closest('.sb-lore-slot');
            const { html: valHtml, msgs } = adv ? adv.validateSlot(sp, slot, val, ctx) : { html: '', msgs: [] };
            const vd = slotEl?.querySelector('.sb-lore-val');
            if (vd) vd.innerHTML = valHtml || '';
            const msgEl = slotEl?.querySelector('.sb-lore-msgs');
            if (msgEl) msgEl.textContent = msgs[0] || '';
            const applyBtn = slotEl?.querySelector('.sb-lore-apply');
            if (applyBtn) applyBtn.disabled = msgs.length > 0;
            const sg = slotEl?.querySelector('.sb-lore-suggs');
            if (sg && adv) {
              const opts = val ? adv.makeIdeaOptions(sp, slot, val, ctx) : [];
              sg.innerHTML = opts.map((o, i) =>
                `<button class="sb-lore-sugg" data-lore-slot="${adv.esc(slot)}" data-lore-idx="${i}">${adv.esc(o.label)}</button>`
              ).join('');
              sg.querySelectorAll('[data-lore-idx]').forEach(btn => {
                btn.addEventListener('click', () => {
                  if (!_loreState || !adv) return;
                  const opt = opts[Number(btn.dataset.loreIdx)];
                  if (opt) { _loreState.births = adv.applyOption(sp, slot, opt, _loreState.births); render(); }
                });
              });
            }
          });
        });

        editorEl.querySelectorAll('.sb-lore-apply').forEach(btn => {
          btn.addEventListener('click', () => {
            if (!_loreState || !adv) return;
            const slot = btn.dataset.loreSlot;
            const input = document.getElementById(`sb-lore-${slot}`);
            if (!input) return;
            const val = input.value;
            const sp = _loreState.sp;
            const ctx = _loreCtx();
            const { msgs } = adv.validateSlot(sp, slot, val, ctx);
            if (msgs.length > 0) return;
            _loreState.births[slot] = val.toLowerCase();
            const preview = document.getElementById('sb-lore-preview');
            if (preview) preview.innerHTML = _buildLorePreviewHtml(sp, _loreState.births, ctx) || '<span class="sb-lore-faint">—</span>';
            const tankanEl = document.getElementById('sb-lore-tankan');
            if (tankanEl) tankanEl.innerHTML = _buildTankanPillars(sp, _loreState.births, ctx) || '';
          });
        });

        editorEl.querySelectorAll('[data-lore-idx]').forEach(btn => {
          btn.addEventListener('click', () => {
            if (!_loreState || !adv) return;
            const sp = _loreState.sp;
            const slot = btn.dataset.loreSlot;
            const opts = adv.makeIdeaOptions(sp, slot, _loreState.births[slot] || '', _loreCtx());
            const opt = opts[Number(btn.dataset.loreIdx)];
            if (opt) { _loreState.births = adv.applyOption(sp, slot, opt, _loreState.births); render(); }
          });
        });

        editorEl.querySelectorAll('[data-lore-place]').forEach(btn => {
          btn.addEventListener('click', () => {
            if (!_loreState) return;
            _loreState.births.surname = 'tley ' + btn.dataset.lorePlace;
            render();
          });
        });

        document.getElementById('sb-lore-married')?.addEventListener('change', e => {
          if (_loreState) { _loreState.married = e.target.checked; render(); }
        });

        document.getElementById('sb-lore-random-btn')?.addEventListener('click', () => {
          if (!_loreState || !adv) return;
          _loreState.births = adv.randomizeName(_loreState.sp, _loreCtx());
          render();
        });

        document.getElementById('sb-lore-copy-btn')?.addEventListener('click', () => {
          if (!_loreState || !adv) return;
          const name = adv.formatFullName(_loreState.sp, _loreState.births, _loreCtx());
          navigator.clipboard?.writeText(name).catch(() => {});
        });
      }

      // Name input live update
      document.getElementById('sb-edit-name')?.addEventListener('input', e => {
        _editName = e.target.value;
        const npc = activeNpc();
        if (npc) { npc.name = (_editName || '').trim() || npc.name; renderNpcBar(); updateExportBar(); }
      });

      // Save appearance
      document.getElementById('sb-save-appearance-btn')?.addEventListener('click', () => {
        saveEditState();
        render();
      });

      // ── Collections handlers ────────────────────────────
      editorEl.querySelectorAll('[data-appearance-slot]').forEach(sel => {
        sel.addEventListener('change', () => {
          const npc = activeNpc();
          if (!npc) return;
          npc.appearance.cosmetics = { ...(npc.appearance.cosmetics || {}), [sel.dataset.appearanceSlot]: sel.value || null };
          render();
        });
      });

      editorEl.querySelectorAll('[data-slot-cat]').forEach(sel => {
        sel.addEventListener('change', () => {
          const cat = sel.dataset.slotCat;
          const id = sel.value;
          if (!id) {
            const equipped = window.ScratchbonesAccount.getEquippedForCategory(cat);
            if (equipped) window.ScratchbonesAccount.unequipCosmetic(equipped);
          } else {
            window.ScratchbonesAccount.equipCosmetic(id);
          }
          render();
        });
      });

      editorEl.querySelectorAll('[data-toggle-dye]').forEach(btn => {
        btn.addEventListener('click', () => {
          const key = btn.dataset.toggleDye;
          _activeDyeSlot = (_activeDyeSlot === key) ? null : key;
          render();
        });
      });

      editorEl.querySelectorAll('[data-apply-dye]').forEach(btn => {
        btn.addEventListener('click', () => {
          window.ScratchbonesAccount.applyDye(btn.dataset.applyDye, btn.dataset.tintKey);
          render();
        });
      });

      editorEl.querySelectorAll('[data-clear-channel]').forEach(btn => {
        btn.addEventListener('click', () => {
          window.ScratchbonesAccount.removeDye(btn.dataset.clearChannel);
          render();
        });
      });

      // ── Deform tab handlers ────────────────────────────
      document.getElementById('sb-save-deform-btn')?.addEventListener('click', () => {
        saveEditState();
        render();
      });
      document.getElementById('sb-deform-reset-btn')?.addEventListener('click', () => {
        if (_editAppearance?.bodyDeform) {
          for (let i = 0; i < _editAppearance.bodyDeform.length; i++) _editAppearance.bodyDeform[i] = [0, 0];
        }
        initDeformGrid();
        renderPreviewCanvas('sb-deform-portrait', _editAppearance);
      });
    }

    // ── Deform grid ────────────────────────────────────────
    // Interactive 4×6 control-point overlay for the permanent body deformer.
    function initDeformGrid() {
      const gridCanvas = document.getElementById('sb-deform-grid');
      if (!gridCanvas || !_editAppearance) return;
      const ctx = gridCanvas.getContext('2d');

      const GCOLS = 4, GROWS = 6, GN = GCOLS * GROWS;
      // Approximate body-layer bounds on the 200×200 canvas.
      // Assumes default xform {ax:0, ay:0, sx:1, sy:1} and PORTRAIT_L=80.
      // Width is assumed square for overlay purposes (actual rendering uses sprite aspect ratio).
      const BX = 60, BY = 60, BW = 80, BH = 80;

      // Ensure bodyDeform array exists on the working copy.
      if (!Array.isArray(_editAppearance.bodyDeform) || _editAppearance.bodyDeform.length !== GN) {
        _editAppearance.bodyDeform = Array.from({ length: GN }, () => [0, 0]);
      }
      const deform = _editAppearance.bodyDeform;

      function ptCanvas(col, row) {
        const idx = row * GCOLS + col;
        const nx = BX + col / (GCOLS - 1) * BW;
        const ny = BY + row / (GROWS - 1) * BH;
        const [dx, dy] = deform[idx] ?? [0, 0];
        return [nx + dx * BW, ny + dy * BH];
      }

      function nearestPoint(cx, cy) {
        let best = null, bestD2 = 16 * 16;
        for (let r = 0; r < GROWS; r++) {
          for (let c = 0; c < GCOLS; c++) {
            const [px, py] = ptCanvas(c, r);
            const d2 = (cx - px) ** 2 + (cy - py) ** 2;
            if (d2 < bestD2) { bestD2 = d2; best = { c, r }; }
          }
        }
        return best;
      }

      // Remove previous listeners by replacing the canvas element.
      const fresh = gridCanvas.cloneNode(false);
      gridCanvas.parentNode.replaceChild(fresh, gridCanvas);
      const gc = fresh;
      const gctx = gc.getContext('2d');

      function canvasXY(e) {
        const rect = gc.getBoundingClientRect();
        return [(e.clientX - rect.left) * (200 / rect.width), (e.clientY - rect.top) * (200 / rect.height)];
      }

      let dragging = null;

      function drawGridOn(c2d) {
        c2d.clearRect(0, 0, 200, 200);
        for (let r = 0; r < GROWS; r++) {
          c2d.beginPath();
          for (let c = 0; c < GCOLS; c++) {
            const [px, py] = ptCanvas(c, r);
            if (c === 0) c2d.moveTo(px, py); else c2d.lineTo(px, py);
          }
          c2d.strokeStyle = 'rgba(242,208,143,0.3)';
          c2d.lineWidth = 1;
          c2d.stroke();
        }
        for (let c = 0; c < GCOLS; c++) {
          c2d.beginPath();
          for (let r = 0; r < GROWS; r++) {
            const [px, py] = ptCanvas(c, r);
            if (r === 0) c2d.moveTo(px, py); else c2d.lineTo(px, py);
          }
          c2d.strokeStyle = 'rgba(242,208,143,0.3)';
          c2d.lineWidth = 1;
          c2d.stroke();
        }
        for (let r = 0; r < GROWS; r++) {
          for (let c = 0; c < GCOLS; c++) {
            const [px, py] = ptCanvas(c, r);
            const idx = r * GCOLS + c;
            const [dx, dy] = deform[idx] ?? [0, 0];
            const moved = Math.abs(dx) > 0.005 || Math.abs(dy) > 0.005;
            c2d.beginPath();
            c2d.arc(px, py, moved ? 6 : 4.5, 0, Math.PI * 2);
            c2d.fillStyle = moved ? 'rgba(200,153,82,0.85)' : 'rgba(242,208,143,0.4)';
            c2d.fill();
            c2d.strokeStyle = moved ? 'rgba(242,208,143,0.95)' : 'rgba(242,208,143,0.6)';
            c2d.lineWidth = 1.5;
            c2d.stroke();
          }
        }
      }

      gc.addEventListener('pointerdown', (e) => {
        const [cx, cy] = canvasXY(e);
        const pt = nearestPoint.call(null, cx, cy);
        if (!pt) return;
        dragging = { ...pt };
        gc.setPointerCapture(e.pointerId);
        e.preventDefault();
      });

      gc.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const [cx, cy] = canvasXY(e);
        const { c, r } = dragging;
        const idx = r * GCOLS + c;
        const nx = BX + c / (GCOLS - 1) * BW;
        const ny = BY + r / (GROWS - 1) * BH;
        deform[idx] = [
          Math.max(-0.45, Math.min(0.45, (cx - nx) / BW)),
          Math.max(-0.45, Math.min(0.45, (cy - ny) / BH)),
        ];
        drawGridOn(gctx);
        renderPreviewCanvas('sb-deform-portrait', _editAppearance);
        e.preventDefault();
      });

      gc.addEventListener('pointerup',     () => { dragging = null; });
      gc.addEventListener('pointercancel', () => { dragging = null; });

      drawGridOn(gctx);
    }

    // ── Export / Import ────────────────────────────────────
    function exportNpc(npc) {
      const ap = npc.appearance ? { ...npc.appearance } : null;
      // Deep-copy bodyDeform so the exported object is standalone.
      if (ap && Array.isArray(ap.bodyDeform)) {
        ap.bodyDeform = ap.bodyDeform.map(p => [...p]);
      }
      return {
        name: npc.name,
        nameFormat: npc.nameFormat || 'nickname',
        loreName: npc.loreName ? { ...npc.loreName } : null,
        appearance: ap,
        equippedCosmetics: [...(npc.equippedCosmetics || [])],
        appliedDyes: { ...(npc.appliedDyes || {}) },
      };
    }

    function sanitizeFilename(name) {
      return (String(name || 'npc').replace(/[^a-z0-9_\-]/gi, '_').replace(/_+/g, '_').replace(/^_|_$/g, '') || 'npc') + '.json';
    }

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importNpcFromData(data) {
      const items = Array.isArray(data) ? data : [data];
      for (const item of items) {
        if (!item || typeof item !== 'object') continue;
        _npcs.push({
          id: makeNpcId(),
          name: String(item.name || 'Imported NPC'),
          nameFormat: item.nameFormat || 'nickname',
          loreName: item.loreName || null,
          appearance: item.appearance
            ? { speciesId: 'mao-ao', gender: 'male', cosmetics: {}, bodyColors: {}, ...item.appearance }
            : { speciesId: 'mao-ao', gender: 'male', cosmetics: {}, bodyColors: {} },
          equippedCosmetics: Array.isArray(item.equippedCosmetics) ? [...item.equippedCosmetics] : [],
          appliedDyes: (item.appliedDyes && typeof item.appliedDyes === 'object') ? { ...item.appliedDyes } : {},
        });
      }
      _activeNpcIdx = _npcs.length - 1;
      loadEditState();
      render();
    }

    function bindExportBar() {
      document.getElementById('npe-export-json-btn')?.addEventListener('click', () => {
        saveEditState();
        const npc = activeNpc();
        if (!npc) return;
        downloadJson(sanitizeFilename(npc.name), exportNpc(npc));
      });

      document.getElementById('npe-export-all-btn')?.addEventListener('click', () => {
        saveEditState();
        downloadJson('npcs.json', _npcs.map(exportNpc));
      });

      document.getElementById('npe-import-btn')?.addEventListener('click', () => {
        document.getElementById('npe-import-file')?.click();
      });

      if (window.RepoPicker) {
        const rp = new RepoPicker({ docsBase: '../../' });
        const dbPicker = rp.makePicker({
          category: 'npcDatabases',
          label: '☷ Load NPC DB',
          fetchAs: 'json',
          onLoad: (entry, data) => {
            try {
              // database has .npcs array — import the first NPC or let user pick
              const npcs = Array.isArray(data) ? data : (data.npcs || []);
              if (npcs.length) { importNpcFromData(npcs[0]); }
              else importNpcFromData(data);
            } catch(e) { alert('Load failed: ' + e.message); }
          }
        });
        const importBtn = document.getElementById('npe-import-btn');
        if (importBtn) importBtn.after(dbPicker);
      }

      document.getElementById('npe-import-file')?.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            importNpcFromData(data);
          } catch (err) {
            alert('Failed to parse JSON: ' + err.message);
          }
        };
        reader.readAsText(file);
        e.target.value = ''; // allow re-importing the same file
      });
    }

    // ── Init ───────────────────────────────────────────────
    function init() {
      const firstNpc = makeNpc('NPC 1');
      _npcs.push(firstNpc);
      _activeNpcIdx = 0;
      loadEditState();
      render();
      bindExportBar();
      // Kick off portrait cosmetics load eagerly
      ensurePortraitCosmetics();
    }

    init();
  })();
  </script>
</body>
</html>
