<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Hobunji Hollow Integrated Map Builder</title>
<style>
:root{--bg:#071018;--panel:#111b28;--text:#edf5ff;--muted:#9fb4cf;--line:#263a53;--acc:#6aa7ff;--good:#34d399;--warn:#fbbf24;--bad:#fb7185}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select,textarea{font:inherit}button{border:1px solid rgba(106,167,255,.38);background:rgba(106,167,255,.16);color:var(--text);border-radius:11px;padding:9px 10px;font-weight:750}button.good{border-color:rgba(52,211,153,.42);background:rgba(52,211,153,.14)}button.warn{border-color:rgba(251,191,36,.45);background:rgba(251,191,36,.14)}button.secondary{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.06)}input,select,textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:10px;color:var(--text);padding:9px 10px}textarea{min-height:240px;resize:vertical;font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.app{height:100%;display:grid;grid-template-columns:minmax(320px,430px) 1fr}.panel{border-right:1px solid var(--line);background:linear-gradient(180deg,var(--panel),#0c1420);overflow:auto}.card{border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.035);padding:10px;margin:10px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}.help{color:var(--muted);font-size:12px;line-height:1.35}.pill{display:inline-flex;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.045);border-radius:999px;padding:4px 8px;color:var(--muted);font-size:12px}.list{display:flex;flex-direction:column;gap:6px}.item{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.035);border-radius:10px;padding:8px;font-size:12px}.view{position:relative;overflow:hidden}canvas{width:100%;height:100%;display:block;touch-action:none}.hud{position:absolute;left:10px;top:10px;display:flex;gap:7px;flex-wrap:wrap}.log{position:absolute;right:10px;bottom:10px;width:min(460px,92vw);max-height:34vh;overflow:auto;background:rgba(9,16,24,.96);border:1px solid rgba(255,255,255,.14);border-radius:13px;padding:8px;font:11px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#c7ddff;white-space:pre-wrap}@media(max-width:780px){.app{grid-template-columns:1fr;grid-template-rows:58vh 42vh}.panel{border-right:0;border-bottom:1px solid var(--line)}.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <div class="card">
      <div class="row"><button id="seedBtn" class="warn">Starter map</button><button id="downloadBtn" class="good">Download bundle</button><button id="copyBtn" class="secondary">Copy bundle</button></div>
      <p class="help">HTML-stage integrated builder. It loads the shared index, links map houses to house pieces and wall recipes, links NPC paths to the NPC database, and exports one resolved bundle with missing-reference debug info.</p>
      <div class="row"><span class="pill" id="statusPill">Booting</span><span class="pill" id="countPill">0 houses</span></div>
    </div>
    <div class="card">
      <div class="grid2"><div><label>Index URL</label><input id="indexUrl" value="../../config/map-builder-index.json"></div><div><label>NPC database</label><select id="npcDbSelect"></select></div></div>
      <div class="row" style="margin-top:8px"><button id="reloadIndexBtn" class="secondary">Reload index</button><button id="loadNpcDbBtn" class="secondary">Load NPC DB</button></div>
      <p class="help" id="indexSummary">Index not loaded.</p>
    </div>
    <div class="card">
      <div class="grid3"><div><label>Map id</label><input id="mapId" value="hobunji_main_town"></div><div><label>Cols</label><input id="mapCols" type="number" value="48"></div><div><label>Rows</label><input id="mapRows" type="number" value="32"></div></div>
    </div>
    <div class="card">
      <div class="grid2"><div><label>House id</label><input id="houseId" value="house_001"></div><div><label>Label</label><input id="houseLabel" value="Highland house"></div></div>
      <div class="grid3" style="margin-top:8px"><div><label>X</label><input id="houseX" type="number" value="7"></div><div><label>Y</label><input id="houseY" type="number" value="18"></div><div><label>Size</label><input id="houseSize" value="6x5"></div></div>
      <div class="grid2" style="margin-top:8px"><div><label>House piece</label><select id="housePieceSel"></select></div><div><label>Wall recipe</label><select id="wallRecipeSel"></select></div></div>
      <div class="row" style="margin-top:8px"><button id="addHouseBtn" class="good">Add house</button><button id="fitBtn" class="secondary">Fit view</button></div>
      <div class="list" id="houseList" style="margin-top:8px"></div>
    </div>
    <div class="card">
      <div class="grid2"><div><label>Path id</label><input id="pathId" value="npc_path_001"></div><div><label>NPC</label><select id="npcSelect"></select></div></div>
      <div class="row" style="margin-top:8px"><button id="newPathBtn" class="good">New path</button><button id="modePathBtn" class="secondary">Tap canvas adds nodes</button></div>
      <div class="list" id="pathList" style="margin-top:8px"></div>
    </div>
    <div class="card"><label>Bundle preview</label><textarea id="jsonPreview" readonly></textarea></div>
  </aside>
  <main class="view"><canvas id="mapCanvas"></canvas><div class="hud"><span class="pill" id="modePill">Mode: house</span><span class="pill" id="missingPill">Missing: none</span></div><pre class="log" id="logBody"></pre></main>
</div>
<script src="../../js/hobunji-map-builder-module.js"></script>
<script src="./map-builder-tool.js"></script>
</body>
</html>
