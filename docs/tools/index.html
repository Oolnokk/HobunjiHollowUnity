<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Hobunji Hollow — Dev Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#07101a;color:#edf5ff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
:root{--bg:#07101a;--panel:#111b28;--border:rgba(255,255,255,.12);--acc:#6aa7ff;--ok:#34d399;--warn:#fbbf24;--bad:#fb7185;--text:#edf5ff;--muted:#9fb4cf}
#shell{display:flex;flex-direction:column;height:100%}
#tabbar{
  display:flex;align-items:stretch;gap:2px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  padding:0 8px;
  flex-shrink:0;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.tab{
  display:flex;align-items:center;gap:6px;
  padding:10px 14px;
  font-size:13px;font-weight:700;
  background:none;border:none;color:var(--muted);cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:color .12s,border-color .12s;
  flex-shrink:0;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--acc)}
.tab-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,.2);
  flex-shrink:0;transition:background .12s;
}
.tab.active .tab-dot{background:var(--ok)}
#frames{flex:1;position:relative;min-height:0}
.frame-wrap{
  position:absolute;inset:0;
  display:none;
}
.frame-wrap.active{display:block}
iframe{
  width:100%;height:100%;border:none;display:block;
  background:var(--bg);
}
/* Title bar for the hub itself */
#titlebar{
  display:flex;align-items:center;gap:10px;
  padding:7px 12px 0;
  background:var(--bg);
  flex-shrink:0;
}
#titlebar h1{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.3px}
#titlebar a{
  margin-left:auto;font-size:11px;color:var(--acc);
  text-decoration:none;border:1px solid rgba(106,167,255,.3);
  border-radius:8px;padding:4px 8px;
}
#titlebar a:hover{background:rgba(106,167,255,.1)}
</style>
</head>
<body>
<div id="shell">
  <div id="titlebar">
    <h1>HOBUNJI HOLLOW — DEV TOOLS</h1>
    <a href="../index.html" target="_blank">▶ Open Game</a>
  </div>
  <div id="tabbar">
    <button class="tab active" data-target="map-builder">
      <span class="tab-dot"></span>Map Builder
    </button>
    <button class="tab" data-target="town-map-editor">
      <span class="tab-dot"></span>Town Map Editor
    </button>
    <button class="tab" data-target="npc-authoring-editor">
      <span class="tab-dot"></span>NPC Authoring
    </button>
    <button class="tab" data-target="npc-portrait-editor">
      <span class="tab-dot"></span>Portrait Editor
    </button>
    <button class="tab" data-target="npc-avatar-preview">
      <span class="tab-dot"></span>Avatar Preview
    </button>
    <button class="tab" data-target="wall-builder">
      <span class="tab-dot"></span>Wall Builder
    </button>
  </div>
  <div id="frames">
    <div class="frame-wrap active" id="fw-map-builder">
      <iframe src="map-builder/index.html" title="Map Builder"></iframe>
    </div>
    <div class="frame-wrap" id="fw-town-map-editor">
      <iframe src="town-map-editor/index.html" title="Town Map Editor"></iframe>
    </div>
    <div class="frame-wrap" id="fw-npc-authoring-editor">
      <iframe src="npc-authoring-editor/index.html" title="NPC Authoring Editor"></iframe>
    </div>
    <div class="frame-wrap" id="fw-npc-portrait-editor">
      <iframe src="npc-portrait-editor/index.html" title="NPC Portrait Editor"></iframe>
    </div>
    <div class="frame-wrap" id="fw-npc-avatar-preview">
      <iframe src="npc-avatar-preview/index.html" title="Avatar Preview"></iframe>
    </div>
    <div class="frame-wrap" id="fw-wall-builder">
      <iframe src="wall-builder/index.html" title="Wall Builder"></iframe>
    </div>
  </div>
</div>
<script>
const tabs = document.querySelectorAll('.tab');
const frames = document.querySelectorAll('.frame-wrap');

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    const target = tab.dataset.target;
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    frames.forEach(f => f.classList.toggle('active', f.id === 'fw-' + target));
  });
});
</script>
</body>
</html>
